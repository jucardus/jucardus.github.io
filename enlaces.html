<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador</title>
</head>
<body>
    <h1>Buscador</h1>
    <input type="text" id="searchBox" placeholder="Escribe y presiona ENTER">
    <div id="resultados"></div>

    <script src="enlaces.js"></script>
    <script>
        function parseEntry(raw) {
            let inner = raw.trim();
            if (inner.startsWith("▓") && inner.endsWith("▓")) {
                inner = inner.slice(1, -1);
            }
            const parts = inner.split("▒");
            return {
                tema: parts[0] || "",
                subtema: parts[1] || "",
                url: parts[2] || "",
                id: parts[3] || ""
            };
        }

        const entries = enlaces.map(parseEntry);
        const searchBox = document.getElementById('searchBox');
        const resultadosDiv = document.getElementById('resultados');
        
        resultadosDiv.innerHTML = entries.length + " entradas cargadas. Escribe y presiona ENTER.";

        searchBox.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const query = searchBox.value.trim().toLowerCase();
                if (query === "") {
                    resultadosDiv.innerHTML = entries.length + " entradas cargadas. Escribe y presiona ENTER.";
                    return;
                }
                
                const results = entries.filter(entry => {
                    return entry.tema.toLowerCase().includes(query) ||
                           entry.subtema.toLowerCase().includes(query) ||
                           entry.url.toLowerCase().includes(query) ||
                           entry.id.toLowerCase().includes(query);
                });
                
                if (results.length === 0) {
                    resultadosDiv.innerHTML = "Ninguna coincidencia";
                    return;
                }
                
                let html = "";
                for (let i = 0; i < results.length; i++) {
                    const e = results[i];
                    const plainText = `${e.tema} ┋ ${e.subtema} ┋ ${e.url} ┋ ${e.id}`;
                    html += `<div><p>`;
                    html += `<span class="tema" data-tema="${e.tema.replace(/"/g, '&quot;')}">${e.tema}</span>`;
                    html += ` ┋ `;
                    html += `<span class="copy" data-text="${plainText.replace(/"/g, '&quot;')}">${e.subtema}</span>`;
                    html += ` ┋ `;
                    html += `<a href="${e.url}" target="_blank" rel="noopener noreferrer nofollow">${e.url}</a>`;
                    html += ` ┋ `;
                    html += `<a href="https://x.com/intent/tweet?text=${encodeURIComponent(plainText)}" target="_blank" rel="noopener noreferrer nofollow">${e.id}</a>`;
                    html += `</p></div>`;
                }
                resultadosDiv.innerHTML = html;
            }
        });
        
        resultadosDiv.addEventListener('click', function(e) {
            const temaSpan = e.target.closest('.tema');
            if (temaSpan) {
                const tema = temaSpan.getAttribute('data-tema');
                const filtered = entries.filter(e => e.tema === tema);
                let html = "";
                for (let i = 0; i < filtered.length; i++) {
                    const e = filtered[i];
                    const plainText = `${e.tema} ┋ ${e.subtema} ┋ ${e.url} ┋ ${e.id}`;
                    html += `<div><p>`;
                    html += `<span class="tema" data-tema="${e.tema.replace(/"/g, '&quot;')}">${e.tema}</span>`;
                    html += ` ┋ `;
                    html += `<span class="copy" data-text="${plainText.replace(/"/g, '&quot;')}">${e.subtema}</span>`;
                    html += ` ┋ `;
                    html += `<a href="${e.url}" target="_blank" rel="noopener noreferrer nofollow">${e.url}</a>`;
                    html += ` ┋ `;
                    html += `<a href="https://x.com/intent/tweet?text=${encodeURIComponent(plainText)}" target="_blank" rel="noopener noreferrer nofollow">${e.id}</a>`;
                    html += `</p></div>`;
                }
                resultadosDiv.innerHTML = html;
                searchBox.value = tema;
                return;
            }
            
            const copySpan = e.target.closest('.copy');
            if (copySpan) {
                const text = copySpan.getAttribute('data-text');
                if (text) navigator.clipboard.writeText(text);
            }
        });
    </script>
</body>
</html>
