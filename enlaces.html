<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador</title>
</head>
<body>
    <h1>Buscador</h1>
    <input type="text" id="searchBox" placeholder="Escribe y presiona ENTER" autocomplete="off">
    <div id="resultados"></div>

    <script src="enlaces.js"></script>
    <script>
        const searchBox = document.getElementById('searchBox');
        const resultadosDiv = document.getElementById('resultados');
        
        let allEntries = [];
        
        function parseEntry(raw) {
            let inner = raw.trim();
            if (inner.startsWith("▓") && inner.endsWith("▓")) {
                inner = inner.slice(1, -1);
            }
            const parts = inner.split("▒");
            return {
                tema: parts[0] || "",
                subtema: parts[1] || "",
                url: parts[2] || "",
                id: parts[3] || ""
            };
        }
        
        if (typeof enlaces !== 'undefined') {
            allEntries = enlaces.map(parseEntry);
            resultadosDiv.innerHTML = `✅ ${allEntries.length} entradas cargadas.`;
        }
        
        function searchGlobal(query) {
            if (!query) return [];
            const lowerQuery = query.toLowerCase();
            return allEntries.filter(entry => {
                return entry.tema.toLowerCase().includes(lowerQuery) ||
                       entry.subtema.toLowerCase().includes(lowerQuery) ||
                       entry.url.toLowerCase().includes(lowerQuery) ||
                       entry.id.toLowerCase().includes(lowerQuery);
            });
        }
        
        function searchByTheme(theme) {
            if (!theme) return [];
            return allEntries.filter(entry => entry.tema === theme);
        }
        
        function getPlainText(entry) {
            return `${entry.tema} ┋ ${entry.subtema} ┋ ${entry.url} ┋ ${entry.id}`;
        }
        
        function getTwitterShareUrl(entry, text) {
            const maxLen = 280;
            let shareText = text;
            if (shareText.length > maxLen) {
                const withoutSubtema = `${entry.tema} ┋  ┋ ${entry.url} ┋ ${entry.id}`;
                const available = maxLen - (withoutSubtema.length + 3);
                if (available > 0) {
                    let shortSubtema = entry.subtema.slice(0, available);
                    if (shortSubtema.length < entry.subtema.length) shortSubtema += "...";
                    shareText = `${entry.tema} ┋ ${shortSubtema} ┋ ${entry.url} ┋ ${entry.id}`;
                } else {
                    shareText = withoutSubtema;
                }
            }
            return `https://x.com/intent/tweet?text=${encodeURIComponent(shareText)}`;
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
        }
        
        function showResults(results) {
            if (!results.length) {
                resultadosDiv.innerHTML = "Ninguna coincidencia";
                return;
            }
            
            let html = "";
            for (const entry of results) {
                html += `<div>`;
                html += `<p>`;
                html += `<span class="tema-click" data-theme="${entry.tema.replace(/"/g, '&quot;')}">${entry.tema}</span>`;
                html += ` ┋ `;
                html += `<span class="subtema-copy" data-text="${getPlainText(entry).replace(/"/g, '&quot;')}">${entry.subtema}</span>`;
                html += ` ┋ `;
                html += `<a href="${entry.url}" target="_blank" rel="noopener noreferrer nofollow">${entry.url}</a>`;
                html += ` ┋ `;
                html += `<a href="${getTwitterShareUrl(entry, getPlainText(entry))}" target="_blank" rel="noopener noreferrer nofollow">${entry.id}</a>`;
                html += `</p>`;
                html += `</div>`;
            }
            resultadosDiv.innerHTML = html;
        }
        
        searchBox.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                const query = searchBox.value.trim();
                if (query === "") {
                    resultadosDiv.innerHTML = `✅ ${allEntries.length} entradas cargadas.`;
                    return;
                }
                showResults(searchGlobal(query));
            }
        });
        
        resultadosDiv.addEventListener("click", (e) => {
            const themeSpan = e.target.closest(".tema-click");
            if (themeSpan) {
                const theme = themeSpan.getAttribute("data-theme");
                if (theme) {
                    showResults(searchByTheme(theme));
                    searchBox.value = theme;
                }
                return;
            }
            
            const copySpan = e.target.closest(".subtema-copy");
            if (copySpan) {
                const text = copySpan.getAttribute("data-text");
                if (text) copyToClipboard(text);
            }
        });
    </script>
</body>
</html>
