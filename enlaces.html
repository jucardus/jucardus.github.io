<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador</title>
</head>
<body>
    <h1>Buscador</h1>
    <input type="text" id="inputBusqueda" placeholder="Escribe y presiona ENTER" disabled>

    <div id="resultadosContainer"></div>

    <script>
        let entidades = [];
        let datosCargados = false;

        function parseEntrada(rawEntry) {
            let inner = rawEntry.trim();
            if (inner.startsWith("▓") && inner.endsWith("▓")) {
                inner = inner.slice(1, -1);
            }
            const partes = inner.split("▒");
            if (partes.length >= 4) {
                return {
                    tema: partes[0] || "",
                    subtema: partes[1] || "",
                    url: partes[2] || "",
                    id: partes[3] || "",
                    raw: rawEntry
                };
            }
            return {
                tema: partes[0] || "",
                subtema: partes[1] || "",
                url: partes[2] || "",
                id: partes[3] || "",
                raw: rawEntry
            };
        }

        function buscarGlobal(query) {
            if (!query || !entidades.length) return [];
            const lowerQuery = query.toLowerCase();
            return entidades.filter(ent => {
                return ent.tema.toLowerCase().includes(lowerQuery) ||
                       ent.subtema.toLowerCase().includes(lowerQuery) ||
                       ent.url.toLowerCase().includes(lowerQuery) ||
                       ent.id.toLowerCase().includes(lowerQuery);
            });
        }

        function buscarPorTemaExacto(temaBuscado) {
            if (!temaBuscado || !entidades.length) return [];
            return entidades.filter(ent => ent.tema === temaBuscado);
        }

        function construirTextoPlano(ent) {
            return `${ent.tema} ┋ ${ent.subtema} ┋ ${ent.url} ┋ ${ent.id}`;
        }

        function generarTwitterShareUrl(ent, textoPlanoOriginal) {
            const MAX_TWEET_LEN = 280;
            const base = "https://x.com/intent/tweet?text=";
            
            let textoParaShare = textoPlanoOriginal;
            if (textoParaShare.length > MAX_TWEET_LEN) {
                let tema = ent.tema;
                let subtemaOrig = ent.subtema;
                let url = ent.url;
                let idEnt = ent.id;
                
                let templateWithoutSubtema = `${tema} ┋  ┋ ${url} ┋ ${idEnt}`;
                let longitudFija = templateWithoutSubtema.length;
                let availableForSubtema = MAX_TWEET_LEN - (longitudFija + 1);
                
                if (availableForSubtema < 5) {
                    let subtemaCorto = subtemaOrig.slice(0, 3) + "...";
                    textoParaShare = `${tema} ┋ ${subtemaCorto} ┋ ${url} ┋ ${idEnt}`;
                } else {
                    let maxLen = Math.max(3, availableForSubtema - 3);
                    let subtemaTrunc = subtemaOrig.slice(0, maxLen);
                    if (subtemaTrunc.length < subtemaOrig.length) subtemaTrunc += "...";
                    textoParaShare = `${tema} ┋ ${subtemaTrunc} ┋ ${url} ┋ ${idEnt}`;
                }
                
                if (textoParaShare.length > MAX_TWEET_LEN) {
                    textoParaShare = textoParaShare.substring(0, MAX_TWEET_LEN - 3) + "...";
                }
            }
            return base + encodeURIComponent(textoParaShare);
        }

        async function copiarTexto(texto) {
            try {
                await navigator.clipboard.writeText(texto);
            } catch (err) {
                console.error("Error al copiar: ", err);
            }
        }

        function renderizarResultados(resultados) {
            const container = document.getElementById("resultadosContainer");
            if (!container) return;

            if (!resultados.length) {
                container.innerHTML = `Ninguna coincidencia`;
                return;
            }

            let html = "";
            for (let ent of resultados) {
                const tema = ent.tema;
                const subtema = ent.subtema;
                const enlaceUrl = ent.url;
                const identificador = ent.id;
                const textoPlanoCompleto = construirTextoPlano(ent);
                
                html += `<div data-tema-original="${tema.replace(/"/g, '&quot;')}" data-subtema-original="${subtema.replace(/"/g, '&quot;')}" data-url="${enlaceUrl.replace(/"/g, '&quot;')}" data-id="${identificador.replace(/"/g, '&quot;')}">`;
                html += `<p>`;
                html += `<span class="tema-clicable" data-temaaccion="${tema.replace(/"/g, '&quot;')}">${tema}</span>`;
                html += ` ┋ `;
                html += `<span class="subtema-copiar" data-copiarcompleto="${textoPlanoCompleto.replace(/"/g, '&quot;')}">${subtema}</span>`;
                html += ` ┋ `;
                
                if (enlaceUrl && (enlaceUrl.startsWith("http://") || enlaceUrl.startsWith("https://"))) {
                    html += `<a href="${enlaceUrl}" target="_blank" rel="noopener noreferrer nofollow">${enlaceUrl}</a>`;
                } else {
                    html += `${enlaceUrl}`;
                }
                
                html += ` ┋ `;
                
                const shareUrl = generarTwitterShareUrl(ent, construirTextoPlano(ent));
                html += `<a href="${shareUrl}" target="_blank" rel="noopener noreferrer nofollow">${identificador}</a>`;
                
                html += `</p>`;
                html += `</div>`;
            }
            container.innerHTML = html;
        }

        function cargarBaseDeDatos() {
            return new Promise((resolve, reject) => {
                if (typeof window.enlaces !== 'undefined' && Array.isArray(window.enlaces)) {
                    resolve(window.enlaces);
                    return;
                }
                
                const script = document.createElement('script');
                script.src = 'enlaces.js';
                script.onload = () => {
                    if (typeof window.enlaces !== 'undefined' && Array.isArray(window.enlaces)) {
                        resolve(window.enlaces);
                    } else {
                        reject(new Error("El archivo enlaces.js no define la variable global 'enlaces'"));
                    }
                };
                script.onerror = () => {
                    reject(new Error("No se pudo cargar el archivo enlaces.js"));
                };
                document.head.appendChild(script);
            });
        }

        async function inicializarBuscador() {
            const container = document.getElementById("resultadosContainer");
            const inputSearch = document.getElementById("inputBusqueda");
            
            try {
                const enlacesData = await cargarBaseDeDatos();
                entidades = enlacesData.map(entry => parseEntrada(entry));
                datosCargados = true;
                
                inputSearch.disabled = false;
                container.innerHTML = ``;
                
                inputSearch.addEventListener("keypress", (event) => {
                    if (event.key === "Enter") {
                        event.preventDefault();
                        const query = inputSearch.value.trim();
                        if (query === "") {
                            container.innerHTML = ``;
                            return;
                        }
                        const resultados = buscarGlobal(query);
                        renderizarResultados(resultados);
                    }
                });
                
            } catch (error) {
                console.error(error);
                container.innerHTML = `Error: No se pudo cargar enlaces.js`;
                inputSearch.disabled = true;
            }
        }

        function configurarDelegacionEventos() {
            const container = document.getElementById("resultadosContainer");
            if (!container) return;

            container.addEventListener("click", async (e) => {
                let temaElem = e.target.closest(".tema-clicable");
                if (temaElem) {
                    e.preventDefault();
                    const temaValue = temaElem.getAttribute("data-temaaccion");
                    if (temaValue && datosCargados) {
                        const resultadosTema = buscarPorTemaExacto(temaValue);
                        renderizarResultados(resultadosTema);
                        const input = document.getElementById("inputBusqueda");
                        if (input) input.value = temaValue;
                    }
                    return;
                }

                let copiarElem = e.target.closest(".subtema-copiar");
                if (copiarElem) {
                    e.preventDefault();
                    let textoCompleto = copiarElem.getAttribute("data-copiarcompleto");
                    if (textoCompleto) {
                        await copiarTexto(textoCompleto);
                    }
                    return;
                }
            });
        }

        configurarDelegacionEventos();
        inicializarBuscador();
    </script>
</body>
</html>
