<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador</title>
</head>
<body>
    <h1>Buscador</h1>
    <input type="text" id="inputBusqueda" placeholder="Escribe y presiona ENTER">
    <div id="resultadosContainer"></div>

    <script>
        var enlaces = [
            "▓música - Cipriano de Rore▒Cipriano de Rore (c. 1515 - 1565): Mentre, lumi maggior del secol nostro▒https://www.youtube.com/watch?v=1R79mWCIym4▒v7gwd0p8▓",
            "▓vocabulario español▒costurón▒https://dle.rae.es/costur%C3%B3n▒ml1d6gb6▓",
            "▓citas▒A veces buscamos respuestas rápidas, soluciones inmediatas. Pero Dios trabaja en lo profundo, en el tiempo lento de la confianza. ~ Papa León XIV▒jucardus▒3z65i5h8▓",
            "▓citas▒Aunque no te ocupes de la política, ella se ocupará de ti. ~ Yves Montand▒jucardus▒isyf3cgd▓",
            "▓citas▒Así, ¡oh conciencia!, de nosotros todos haces unos cobardes, y la ardiente resolución original decae al pálido mirar del pensamiento. ~ William Shakespeare▒jucardus▒7lkosc7d▓",
            "▓citas▒Arrancad la esperanza del corazón del hombre y haréis de él un animal de presa. ~ Marie Louise de la Ramée▒jucardus▒mp6rnkqh▓",
            "▓citas▒Aquellos que entregan su libertad a cambio de seguridad no tendrán, y no merecen, ninguna de las dos. ~ Benjamin Franklin▒jucardus▒46ucl3tu▓",
            "▓vocabulario español▒mascullar▒https://dle.rae.es/mascullar▒y53po4w8▓"
        ];

        function parseEntrada(rawEntry) {
            var inner = rawEntry.trim();
            if (inner.startsWith("▓") && inner.endsWith("▓")) {
                inner = inner.slice(1, -1);
            }
            var partes = inner.split("▒");
            return {
                tema: partes[0] || "",
                subtema: partes[1] || "",
                url: partes[2] || "",
                id: partes[3] || ""
            };
        }

        var entidades = [];
        for (var i = 0; i < enlaces.length; i++) {
            entidades.push(parseEntrada(enlaces[i]));
        }

        function buscarGlobal(query) {
            if (!query) return [];
            var lowerQuery = query.toLowerCase();
            var resultados = [];
            for (var i = 0; i < entidades.length; i++) {
                var ent = entidades[i];
                if (ent.tema.toLowerCase().indexOf(lowerQuery) !== -1 ||
                    ent.subtema.toLowerCase().indexOf(lowerQuery) !== -1 ||
                    ent.url.toLowerCase().indexOf(lowerQuery) !== -1 ||
                    ent.id.toLowerCase().indexOf(lowerQuery) !== -1) {
                    resultados.push(ent);
                }
            }
            return resultados;
        }

        function buscarPorTemaExacto(temaBuscado) {
            if (!temaBuscado) return [];
            var resultados = [];
            for (var i = 0; i < entidades.length; i++) {
                if (entidades[i].tema === temaBuscado) {
                    resultados.push(entidades[i]);
                }
            }
            return resultados;
        }

        function construirTextoPlano(ent) {
            return ent.tema + " ┋ " + ent.subtema + " ┋ " + ent.url + " ┋ " + ent.id;
        }

        function generarTwitterShareUrl(ent, textoPlanoOriginal) {
            var MAX_TWEET_LEN = 280;
            var base = "https://x.com/intent/tweet?text=";
            var textoParaShare = textoPlanoOriginal;
            
            if (textoParaShare.length > MAX_TWEET_LEN) {
                var tema = ent.tema;
                var subtemaOrig = ent.subtema;
                var url = ent.url;
                var idEnt = ent.id;
                var templateWithoutSubtema = tema + " ┋  ┋ " + url + " ┋ " + idEnt;
                var longitudFija = templateWithoutSubtema.length;
                var availableForSubtema = MAX_TWEET_LEN - (longitudFija + 1);
                
                if (availableForSubtema < 5) {
                    var subtemaCorto = subtemaOrig.slice(0, 3) + "...";
                    textoParaShare = tema + " ┋ " + subtemaCorto + " ┋ " + url + " ┋ " + idEnt;
                } else {
                    var maxLen = Math.max(3, availableForSubtema - 3);
                    var subtemaTrunc = subtemaOrig.slice(0, maxLen);
                    if (subtemaTrunc.length < subtemaOrig.length) subtemaTrunc += "...";
                    textoParaShare = tema + " ┋ " + subtemaTrunc + " ┋ " + url + " ┋ " + idEnt;
                }
                
                if (textoParaShare.length > MAX_TWEET_LEN) {
                    textoParaShare = textoParaShare.substring(0, MAX_TWEET_LEN - 3) + "...";
                }
            }
            return base + encodeURIComponent(textoParaShare);
        }

        function copiarTexto(texto) {
            try {
                navigator.clipboard.writeText(texto);
            } catch (err) {
                console.error("Error al copiar: ", err);
            }
        }

        function renderizarResultados(resultados) {
            var container = document.getElementById("resultadosContainer");
            if (!container) return;

            if (!resultados.length) {
                container.innerHTML = "Ninguna coincidencia";
                return;
            }

            var html = "";
            for (var i = 0; i < resultados.length; i++) {
                var ent = resultados[i];
                var tema = ent.tema;
                var subtema = ent.subtema;
                var enlaceUrl = ent.url;
                var identificador = ent.id;
                var textoPlanoCompleto = construirTextoPlano(ent);
                
                html += "<div>";
                html += "<p>";
                html += "<span class='tema-clicable' data-temaaccion='" + tema.replace(/"/g, '&quot;') + "'>" + tema + "</span>";
                html += " ┋ ";
                html += "<span class='subtema-copiar' data-copiarcompleto='" + textoPlanoCompleto.replace(/"/g, '&quot;') + "'>" + subtema + "</span>";
                html += " ┋ ";
                
                if (enlaceUrl && (enlaceUrl.indexOf("http://") === 0 || enlaceUrl.indexOf("https://") === 0)) {
                    html += "<a href='" + enlaceUrl + "' target='_blank' rel='noopener noreferrer nofollow'>" + enlaceUrl + "</a>";
                } else {
                    html += enlaceUrl;
                }
                
                html += " ┋ ";
                
                var shareUrl = generarTwitterShareUrl(ent, construirTextoPlano(ent));
                html += "<a href='" + shareUrl + "' target='_blank' rel='noopener noreferrer nofollow'>" + identificador + "</a>";
                
                html += "</p>";
                html += "</div>";
            }
            container.innerHTML = html;
        }

        var inputSearch = document.getElementById("inputBusqueda");
        var container = document.getElementById("resultadosContainer");

        inputSearch.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                var query = inputSearch.value.trim();
                if (query === "") {
                    container.innerHTML = "";
                    return;
                }
                var resultados = buscarGlobal(query);
                renderizarResultados(resultados);
            }
        });

        container.addEventListener("click", function(e) {
            var temaElem = e.target.closest(".tema-clicable");
            if (temaElem) {
                e.preventDefault();
                var temaValue = temaElem.getAttribute("data-temaaccion");
                if (temaValue) {
                    var resultadosTema = buscarPorTemaExacto(temaValue);
                    renderizarResultados(resultadosTema);
                    inputSearch.value = temaValue;
                }
                return;
            }

            var copiarElem = e.target.closest(".subtema-copiar");
            if (copiarElem) {
                e.preventDefault();
                var textoCompleto = copiarElem.getAttribute("data-copiarcompleto");
                if (textoCompleto) {
                    copiarTexto(textoCompleto);
                }
                return;
            }
        });

        container.innerHTML = "";
    </script>
</body>
</html>
