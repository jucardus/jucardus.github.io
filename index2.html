<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jucardus.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            line-height: 1.6;
            max-width: 56%;
            margin: 0 auto;
            padding: 20px;
        }
        .entry {
            margin-bottom: 40px;
            border-bottom: 1px solid #ddd; /* Darker border */
            padding-bottom: 20px;
        }
        .meta {
            color: #666;
            font-size: 0.9em;
            margin: 2px 0 10px 0;
        }
        .meta .clickable {
            cursor: pointer;
            color: #0066cc;
        }
        .meta .clickable:hover {
            text-decoration: underline;
        }
        .meta .non-clickable {
            color: #666;
            cursor: default;
        }
        img {
            max-width: 100%;
            height: auto;
            margin-top: 10px;
            border-radius: 8px;
        }
        a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
        h2 {
            cursor: pointer;
            margin-bottom: 0;
        }
        h2:hover {
            color: #0066cc;
        }
        #back-button {
            display: none;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Inter';
        }
        #back-button:hover {
            background: #e0e0e0;
        }
        #main-title {
            margin-bottom: 10px;
        }
        #main-menu {
            position: sticky;
            top: 0;
            background: white;
            padding: 10px 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-bottom: 1px solid #ddd; /* Separator line */
            margin-bottom: 4px; /* Space under menu */
        }
        #main-menu a {
            color: #333;
            text-decoration: none;
            font-weight: 500;
        }
        #main-menu a:hover {
            color: #0066cc;
        }
        #menu-separator {
            height: 4px;
            border-bottom: 1px solid #ddd;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1 id="main-title">Jucardus.com</h1>
    
    <div id="main-menu">
        <a href="#">AZ</a>
        <a href="#">Azar</a>
        <a href="#">Archivo</a>
        <a href="#">Etiquetas</a>
        <a href="#">Autor</a>
        <a href="#">🔍</a>
    </div>
    
    <div id="menu-separator"></div>
    
    <button id="back-button" onclick="showAllEntries()">← Back to all entries</button>
    <div id="entries-container"></div>

    <script>
        let allEntries = []; // Store all entries for filtering
        
        // Function to fetch and process the CSV data
        async function loadEntries() {
            try {
                const response = await fetch('https://jucardus.github.io/base.csv');
                const csvData = await response.text();
                allEntries = parseCSV(csvData);
                displayEntries(allEntries);
            } catch (error) {
                console.error('Error loading the CSV file:', error);
                document.getElementById('entries-container').innerHTML = 
                    '<p>Error loading entries. Please try again later.</p>';
            }
        }

        // Improved CSV parser that handles quoted fields with commas
        function parseCSV(csv) {
            const lines = csv.split('\n');
            const result = [];
            const headers = lines[0].split(',').map(h => h.trim());
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const obj = {};
                let currentline = lines[i];
                
                // Handle quoted fields that may contain commas
                const regex = /(?:,|^)("(?:(?:"")*[^"]*)*"|[^,]*)/g;
                let matches;
                const fields = [];
                
                while ((matches = regex.exec(currentline)) !== null) {
                    let field = matches[1];
                    if (field.startsWith('"') && field.endsWith('"')) {
                        field = field.slice(1, -1).replace(/""/g, '"');
                    }
                    fields.push(field.trim());
                }
                
                for (let j = 0; j < headers.length; j++) {
                    let value = fields[j] || '';
                    
                    // Use first 40 chars of CONTENIDO if TÍTULO is empty
                    if (headers[j] === 'TÍTULO' && !value && fields[3]) {
                        value = fields[3].substring(0, 40);
                        if (fields[3].length > 40) value += '...';
                    }
                    
                    obj[headers[j]] = value;
                }
                
                result.push(obj);
            }
            
            return result;
        }

        // Function to extract domain from URL
        function extractDomain(url) {
            try {
                const domain = new URL(url.startsWith('http') ? url : `https://${url}`).hostname;
                return domain.startsWith('www.') ? domain : domain;
            } catch {
                return url;
            }
        }

        // Function to process content with special characters and HTML
        function processContent(content) {
            if (!content) return '';
            
            // Replace special characters with HTML tags
            let processed = content
                .replace(/¶/g, '</p><p>')
                .replace(/¦/g, '<br>');
            
            // Ensure we have proper paragraph tags
            if (!processed.startsWith('<p>')) processed = '<p>' + processed;
            if (!processed.endsWith('</p>')) processed = processed + '</p>';
            
            return processed;
        }

        // Function to display filtered entries
        function displayEntries(entries, filterType = null, filterValue = null) {
            const container = document.getElementById('entries-container');
            container.innerHTML = '';
            
            const backButton = document.getElementById('back-button');
            backButton.style.display = filterType ? 'block' : 'none';
            
            entries.forEach(entry => {
                const entryDiv = document.createElement('div');
                entryDiv.className = 'entry';
                if (filterType === 'single') {
                    entryDiv.id = `entry-${entry['']}`;
                }
                
                // Create title with click handler
                const title = document.createElement('h2');
                title.textContent = entry['TÍTULO'] || '';
                title.onclick = () => showSingleEntry(entry['']);
                
                // Create meta line with only TEMA clickable
                const meta = document.createElement('div');
                meta.className = 'meta';
                
                const rowNumber = entry[''] ? `<span class="non-clickable">${entry['']}</span>` : '';
                const tema = entry['TEMA'] ? `<span class="clickable" onclick="filterByLabel('${entry['TEMA']}')">${entry['TEMA']}</span>` : '';
                const fecha = entry['FECHA'] ? `<span class="non-clickable">${entry['FECHA']}</span>` : '';
                
                meta.innerHTML = [
                    rowNumber,
                    tema,
                    fecha
                ].filter(Boolean).join(' | ');
                
                // Create content if exists
                const content = document.createElement('div');
                const processedContent = processContent(entry['CONTENIDO']);
                if (processedContent) {
                    content.innerHTML = processedContent;
                }
                
                // Create link if exists
                const link = document.createElement('p');
                if (entry['ENLACE']) {
                    const linkAnchor = document.createElement('a');
                    linkAnchor.href = entry['ENLACE'];
                    linkAnchor.textContent = extractDomain(entry['ENLACE']);
                    linkAnchor.target = '_blank';
                    linkAnchor.rel = 'noopener noreferrer';
                    link.appendChild(linkAnchor);
                }
                
                // Create image if exists
                const imageContainer = document.createElement('div');
                if (entry['IMAGEN']) {
                    const img = document.createElement('img');
                    img.src = entry['IMAGEN'];
                    img.alt = entry['TÍTULO'] || 'Entry image';
                    imageContainer.appendChild(img);
                }
                
                // Append all non-empty elements to the entry div
                entryDiv.appendChild(title);
                if (rowNumber || tema || fecha) {
                    entryDiv.appendChild(meta);
                }
                if (processedContent) {
                    entryDiv.appendChild(content);
                }
                if (entry['ENLACE']) {
                    entryDiv.appendChild(link);
                }
                if (entry['IMAGEN']) {
                    entryDiv.appendChild(imageContainer);
                }
                
                container.appendChild(entryDiv);
            });
        }

        // Filter entries by label
        function filterByLabel(label) {
            const filtered = allEntries.filter(entry => entry['TEMA'] === label);
            document.querySelector('h1').textContent = `Entries with label: ${label}`;
            displayEntries(filtered, 'label', label);
        }

        // Show single entry
        function showSingleEntry(rowNumber) {
            const entry = allEntries.find(e => e[''] === rowNumber);
            if (entry) {
                document.querySelector('h1').textContent = entry['TÍTULO'] || 'Entry';
                displayEntries([entry], 'single', rowNumber);
            }
        }

        // Show all entries
        function showAllEntries() {
            document.querySelector('h1').textContent = 'Jucardus.com';
            displayEntries(allEntries);
        }

        // Load entries when the page loads
        window.onload = loadEntries;
    </script>
</body>
</html>
