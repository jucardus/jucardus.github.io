<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jucardus.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            line-height: 1.6;
            max-width: 56%;
            margin: 0 auto;
            padding: 20px;
        }
        .entry {
            margin-bottom: 40px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 20px;
        }
        .meta {
            color: #666;
            font-size: 0.9em;
            margin: 2px 0 10px 0;
        }
        .meta .clickable {
            cursor: pointer;
            color: #0066cc;
        }
        .meta .clickable:hover {
            text-decoration: underline;
        }
        .meta .non-clickable {
            color: #666;
            cursor: default;
        }
        img {
            max-width: 100%;
            height: auto;
            margin-top: 10px;
            border-radius: 8px;
        }
        a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        h2 {
            cursor: pointer;
            margin-bottom: 0;
        }
        h2:hover {
            color: #0066cc;
        }
        #back-button {
            display: none;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Inter';
        }
        #back-button:hover {
            background: #e0e0e0;
        }
        #main-menu {
            position: sticky;
            top: 0;
            background: white;
            padding: 10px 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-bottom: 1px solid #ddd;
            margin-bottom: 4px;
        }
        #main-menu a {
            color: #333;
            text-decoration: none;
            font-weight: 500;
        }
        #main-menu a:hover {
            color: #0066cc;
        }
        #menu-separator {
            height: 4px;
            border-bottom: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .nav-buttons button {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Inter';
        }
        .nav-buttons button:hover {
            background: #e0e0e0;
        }
        .nav-buttons button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .list-view {
            margin-bottom: 30px;
        }
        .list-view h2 {
            margin-bottom: 15px;
        }
        .list-view ul {
            list-style-type: none;
            padding: 0;
        }
        .list-view li {
            margin-bottom: 8px;
            cursor: pointer;
            color: #0066cc;
        }
        .list-view li:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1 id="main-title">Jucardus.com</h1>
    
    <div id="main-menu">
        <a href="#" onclick="showHome()">Inicio</a>
        <a href="#" onclick="showAZ()">AZ</a>
        <a href="#" onclick="showRandom()">Azar</a>
        <a href="#" onclick="showArchive()">Archivo</a>
        <a href="#" onclick="showTags()">Etiquetas</a>
        <a href="#">Autor</a>
        <a href="#">🔍</a>
    </div>
    
    <div id="menu-separator"></div>
    
    <button id="back-button" onclick="showHome()">← Back to all entries</button>
    <div id="entries-container"></div>
    <div class="nav-buttons">
        <button id="prev-button" onclick="loadPrevEntries()" disabled>← Previous</button>
        <button id="next-button" onclick="loadNextEntries()">Next →</button>
    </div>

    <script>
        let allEntries = [];
        let currentStartIndex = 0;
        const entriesPerPage = 10;
        let currentView = 'home';
        
        // Function to fetch and process the CSV data
        async function loadEntries() {
            try {
                const response = await fetch('https://jucardus.github.io/base.csv');
                const csvData = await response.text();
                allEntries = parseCSV(csvData);
                showHome();
            } catch (error) {
                console.error('Error loading the CSV file:', error);
                document.getElementById('entries-container').innerHTML = 
                    '<p>Error loading entries. Please try again later.</p>';
            }
        }

        // Improved CSV parser
        function parseCSV(csv) {
            const lines = csv.split('\n');
            const result = [];
            const headers = lines[0].split(',').map(h => h.trim());
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const obj = {};
                let currentline = lines[i];
                
                const regex = /(?:,|^)("(?:(?:"")*[^"]*)*"|[^,]*)/g;
                let matches;
                const fields = [];
                
                while ((matches = regex.exec(currentline)) !== null) {
                    let field = matches[1];
                    if (field.startsWith('"') && field.endsWith('"')) {
                        field = field.slice(1, -1).replace(/""/g, '"');
                    }
                    fields.push(field.trim());
                }
                
                for (let j = 0; j < headers.length; j++) {
                    let value = fields[j] || '';
                    
                    if (headers[j] === 'TÍTULO' && !value && fields[3]) {
                        value = fields[3].substring(0, 40);
                        if (fields[3].length > 40) value += '...';
                    }
                    
                    obj[headers[j]] = value;
                }
                
                result.push(obj);
            }
            
            return result;
        }

        // Navigation functions
        function showHome() {
            currentView = 'home';
            currentStartIndex = 0;
            document.getElementById('main-title').textContent = 'Jucardus.com';
            document.getElementById('back-button').style.display = 'none';
            displayCurrentEntries();
        }

        function showAZ() {
            currentView = 'az';
            document.getElementById('main-title').textContent = 'Alphabetical Index';
            document.getElementById('back-button').style.display = 'block';
            
            const sortedEntries = [...allEntries].sort((a, b) => {
                const titleA = a['TÍTULO'] || '';
                const titleB = b['TÍTULO'] || '';
                return titleA.localeCompare(titleB);
            });
            
            const container = document.getElementById('entries-container');
            container.innerHTML = `
                <div class="list-view">
                    <h2>All Entries (A-Z)</h2>
                    <ul>
                        ${sortedEntries.map(entry => `
                            <li onclick="showSingleEntry('${entry['']}')">
                                ${entry['TÍTULO'] || 'Untitled'}
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
            
            document.querySelector('.nav-buttons').style.display = 'none';
        }

        function showRandom() {
            currentView = 'random';
            document.getElementById('main-title').textContent = 'Random Entries';
            document.getElementById('back-button').style.display = 'block';
            
            // Get 3 random unique entries
            const randomEntries = [];
            const indices = new Set();
            while (randomEntries.length < 3 && randomEntries.length < allEntries.length) {
                const randomIndex = Math.floor(Math.random() * allEntries.length);
                if (!indices.has(randomIndex)) {
                    indices.add(randomIndex);
                    randomEntries.push(allEntries[randomIndex]);
                }
            }
            
            const container = document.getElementById('entries-container');
            container.innerHTML = `
                <div class="list-view">
                    <h2>Random Selection</h2>
                    <ul>
                        ${randomEntries.map(entry => `
                            <li onclick="showSingleEntry('${entry['']}')">
                                ${entry['TÍTULO'] || 'Untitled'}
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
            
            document.querySelector('.nav-buttons').style.display = 'none';
        }

        function showArchive() {
            currentView = 'archive';
            document.getElementById('main-title').textContent = 'Archive by Date';
            document.getElementById('back-button').style.display = 'block';
            
            const sortedEntries = [...allEntries].sort((a, b) => {
                const dateA = a['FECHA'] || '';
                const dateB = b['FECHA'] || '';
                return dateB.localeCompare(dateA); // Newest first
            });
            
            const container = document.getElementById('entries-container');
            container.innerHTML = `
                <div class="list-view">
                    <h2>Entries by Date</h2>
                    <ul>
                        ${sortedEntries.map(entry => `
                            <li onclick="showSingleEntry('${entry['']}')">
                                [${entry['FECHA'] || 'No date'}] ${entry['TÍTULO'] || 'Untitled'}
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
            
            document.querySelector('.nav-buttons').style.display = 'none';
        }

        function showTags() {
            currentView = 'tags';
            document.getElementById('main-title').textContent = 'All Tags';
            document.getElementById('back-button').style.display = 'block';
            
            // Get all unique tags
            const tags = new Set();
            allEntries.forEach(entry => {
                if (entry['TEMA']) {
                    tags.add(entry['TEMA']);
                }
            });
            
            const sortedTags = Array.from(tags).sort();
            
            const container = document.getElementById('entries-container');
            container.innerHTML = `
                <div class="list-view">
                    <h2>All Tags (A-Z)</h2>
                    <ul>
                        ${sortedTags.map(tag => `
                            <li onclick="filterByLabel('${tag}')">
                                ${tag}
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
            
            document.querySelector('.nav-buttons').style.display = 'none';
        }

        function loadNextEntries() {
            currentStartIndex += entriesPerPage;
            displayCurrentEntries();
        }

        function loadPrevEntries() {
            currentStartIndex -= entriesPerPage;
            displayCurrentEntries();
        }

        function displayCurrentEntries() {
            const currentEntries = allEntries.slice(currentStartIndex, currentStartIndex + entriesPerPage);
            displayEntries(currentEntries);
            
            // Update navigation buttons
            document.getElementById('prev-button').disabled = currentStartIndex === 0;
            document.getElementById('next-button').disabled = currentStartIndex + entriesPerPage >= allEntries.length;
            document.querySelector('.nav-buttons').style.display = 'flex';
        }

        // Function to display entries
        function displayEntries(entries, filterType = null, filterValue = null) {
            if (currentView !== 'home') return;
            
            const container = document.getElementById('entries-container');
            container.innerHTML = '';
            
            entries.forEach(entry => {
                const entryDiv = document.createElement('div');
                entryDiv.className = 'entry';
                
                const title = document.createElement('h2');
                title.textContent = entry['TÍTULO'] || '';
                title.onclick = () => showSingleEntry(entry['']);
                
                const meta = document.createElement('div');
                meta.className = 'meta';
                
                const rowNumber = entry[''] ? `<span class="non-clickable">${entry['']}</span>` : '';
                const tema = entry['TEMA'] ? `<span class="clickable" onclick="filterByLabel('${entry['TEMA']}')">${entry['TEMA']}</span>` : '';
                const fecha = entry['FECHA'] ? `<span class="non-clickable">${entry['FECHA']}</span>` : '';
                
                meta.innerHTML = [
                    rowNumber,
                    tema,
                    fecha
                ].filter(Boolean).join(' | ');
                
                const content = document.createElement('div');
                const processedContent = processContent(entry['CONTENIDO']);
                if (processedContent) {
                    content.innerHTML = processedContent;
                }
                
                const link = document.createElement('p');
                if (entry['ENLACE']) {
                    const linkAnchor = document.createElement('a');
                    linkAnchor.href = entry['ENLACE'];
                    linkAnchor.textContent = extractDomain(entry['ENLACE']);
                    linkAnchor.target = '_blank';
                    linkAnchor.rel = 'noopener noreferrer';
                    link.appendChild(linkAnchor);
                }
                
                const imageContainer = document.createElement('div');
                if (entry['IMAGEN']) {
                    const img = document.createElement('img');
                    img.src = entry['IMAGEN'];
                    img.alt = entry['TÍTULO'] || 'Entry image';
                    imageContainer.appendChild(img);
                }
                
                entryDiv.appendChild(title);
                if (rowNumber || tema || fecha) {
                    entryDiv.appendChild(meta);
                }
                if (processedContent) {
                    entryDiv.appendChild(content);
                }
                if (entry['ENLACE']) {
                    entryDiv.appendChild(link);
                }
                if (entry['IMAGEN']) {
                    entryDiv.appendChild(imageContainer);
                }
                
                container.appendChild(entryDiv);
            });
        }

        // Function to extract domain from URL
        function extractDomain(url) {
            try {
                const domain = new URL(url.startsWith('http') ? url : `https://${url}`).hostname;
                return domain.startsWith('www.') ? domain : domain;
            } catch {
                return url;
            }
        }

        // Function to process content
        function processContent(content) {
            if (!content) return '';
            
            let processed = content
                .replace(/¶/g, '</p><p>')
                .replace(/¦/g, '<br>');
            
            if (!processed.startsWith('<p>')) processed = '<p>' + processed;
            if (!processed.endsWith('</p>')) processed = processed + '</p>';
            
            return processed;
        }

        // Filter entries by label
        function filterByLabel(label) {
            currentView = 'filtered';
            const filtered = allEntries.filter(entry => entry['TEMA'] === label);
            document.getElementById('main-title').textContent = `Entries with label: ${label}`;
            document.getElementById('back-button').style.display = 'block';
            
            const container = document.getElementById('entries-container');
            container.innerHTML = '';
            
            filtered.forEach(entry => {
                const entryDiv = document.createElement('div');
                entryDiv.className = 'entry';
                
                const title = document.createElement('h2');
                title.textContent = entry['TÍTULO'] || '';
                title.onclick = () => showSingleEntry(entry['']);
                
                const meta = document.createElement('div');
                meta.className = 'meta';
                
                const rowNumber = entry[''] ? `<span class="non-clickable">${entry['']}</span>` : '';
                const tema = entry['TEMA'] ? `<span class="clickable" onclick="filterByLabel('${entry['TEMA']}')">${entry['TEMA']}</span>` : '';
                const fecha = entry['FECHA'] ? `<span class="non-clickable">${entry['FECHA']}</span>` : '';
                
                meta.innerHTML = [
                    rowNumber,
                    tema,
                    fecha
                ].filter(Boolean).join(' | ');
                
                const content = document.createElement('div');
                const processedContent = processContent(entry['CONTENIDO']);
                if (processedContent) {
                    content.innerHTML = processedContent;
                }
                
                const link = document.createElement('p');
                if (entry['ENLACE']) {
                    const linkAnchor = document.createElement('a');
                    linkAnchor.href = entry['ENLACE'];
                    linkAnchor.textContent = extractDomain(entry['ENLACE']);
                    linkAnchor.target = '_blank';
                    linkAnchor.rel = 'noopener noreferrer';
                    link.appendChild(linkAnchor);
                }
                
                const imageContainer = document.createElement('div');
                if (entry['IMAGEN']) {
                    const img = document.createElement('img');
                    img.src = entry['IMAGEN'];
                    img.alt = entry['TÍTULO'] || 'Entry image';
                    imageContainer.appendChild(img);
                }
                
                entryDiv.appendChild(title);
                if (rowNumber || tema || fecha) {
                    entryDiv.appendChild(meta);
                }
                if (processedContent) {
                    entryDiv.appendChild(content);
                }
                if (entry['ENLACE']) {
                    entryDiv.appendChild(link);
                }
                if (entry['IMAGEN']) {
                    entryDiv.appendChild(imageContainer);
                }
                
                container.appendChild(entryDiv);
            });
            
            document.querySelector('.nav-buttons').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Show single entry
        function showSingleEntry(rowNumber) {
            currentView = 'single';
            const entry = allEntries.find(e => e[''] === rowNumber);
            if (entry) {
                document.getElementById('main-title').textContent = entry['TÍTULO'] || 'Entry';
                document.getElementById('back-button').style.display = 'block';
                
                const container = document.getElementById('entries-container');
                container.innerHTML = '';
                
                const entryDiv = document.createElement('div');
                entryDiv.className = 'entry';
                entryDiv.id = `entry-${entry['']}`;
                
                const meta = document.createElement('div');
                meta.className = 'meta';
                
                const rowNumberSpan = entry[''] ? `<span class="non-clickable">${entry['']}</span>` : '';
                const tema = entry['TEMA'] ? `<span class="clickable" onclick="filterByLabel('${entry['TEMA']}')">${entry['TEMA']}</span>` : '';
                const fecha = entry['FECHA'] ? `<span class="non-clickable">${entry['FECHA']}</span>` : '';
                
                meta.innerHTML = [
                    rowNumberSpan,
                    tema,
                    fecha
                ].filter(Boolean).join(' | ');
                
                const content = document.createElement('div');
                const processedContent = processContent(entry['CONTENIDO']);
                if (processedContent) {
                    content.innerHTML = processedContent;
                }
                
                const link = document.createElement('p');
                if (entry['ENLACE']) {
                    const linkAnchor = document.createElement('a');
                    linkAnchor.href = entry['ENLACE'];
                    linkAnchor.textContent = extractDomain(entry['ENLACE']);
                    linkAnchor.target = '_blank';
                    linkAnchor.rel = 'noopener noreferrer';
                    link.appendChild(linkAnchor);
                }
                
                const imageContainer = document.createElement('div');
                if (entry['IMAGEN']) {
                    const img = document.createElement('img');
                    img.src = entry['IMAGEN'];
                    img.alt = entry['TÍTULO'] || 'Entry image';
                    imageContainer.appendChild(img);
                }
                
                entryDiv.appendChild(meta);
                if (processedContent) {
                    entryDiv.appendChild(content);
                }
                if (entry['ENLACE']) {
                    entryDiv.appendChild(link);
                }
                if (entry['IMAGEN']) {
                    entryDiv.appendChild(imageContainer);
                }
                
                container.appendChild(entryDiv);
            }
            
            document.querySelector('.nav-buttons').style.display = 'none';
        }

        // Load entries when the page loads
        window.onload = loadEntries;
    </script>
</body>
</html>
