<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jucardus.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            line-height: 1.6;
            max-width: 56%;
            margin: 0 auto;
            padding: 20px;
        }
        /* ... (keep all previous styles) ... */
        #search-container {
            display: none;
            margin: 20px auto;
            max-width: 200px; /* Half width */
        }
        #search-box {
            width: 100%;
            padding: 8px;
            font-family: 'Courier New', Courier, monospace, sans-serif;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: left; /* Left aligned text */
            autocomplete: "off";
        }
        #search-box::placeholder {
            font-family: 'Courier New', Courier, monospace, sans-serif;
            text-align: left; /* Left aligned placeholder */
        }
    </style>
</head>
<body class="scroll-smooth">
    <!-- ... (keep all previous HTML) ... -->

    <script>
        // ... (keep all previous JavaScript functions until showArchive) ...

        function showArchive() {
            currentView = 'archive';
            document.getElementById('main-title').textContent = 'Archive by Date';
            document.getElementById('back-button').style.display = 'block';
            document.getElementById('search-container').style.display = 'none';
            
            // Group entries by year, month, and day (without time)
            const groupedEntries = {};
            
            allEntries.forEach(entry => {
                if (!entry['FECHA']) return;
                
                // Extract just the date part (YYYY-MM-DD) ignoring time
                const dateOnly = entry['FECHA'].split(' ')[0];
                const dateParts = dateOnly.split('-');
                if (dateParts.length < 3) return;
                
                const year = dateParts[0];
                const month = dateParts[1];
                const day = dateParts[2];
                
                if (!groupedEntries[year]) {
                    groupedEntries[year] = {};
                }
                if (!groupedEntries[year][month]) {
                    groupedEntries[year][month] = {};
                }
                if (!groupedEntries[year][month][day]) {
                    groupedEntries[year][month][day] = [];
                }
                
                groupedEntries[year][month][day].push(entry);
            });
            
            // Sort years in ascending order (oldest first)
            const sortedYears = Object.keys(groupedEntries).sort((a, b) => a - b);
            
            let archiveHTML = '<div class="list-view"><h2>Entries by Date</h2>';
            
            sortedYears.forEach(year => {
                archiveHTML += `<div class="archive-year"><h3>${year}</h3>`;
                
                // Sort months in ascending order
                const sortedMonths = Object.keys(groupedEntries[year]).sort((a, b) => a - b);
                
                sortedMonths.forEach(month => {
                    archiveHTML += `<div class="archive-month"><h4>${getMonthName(month)}</h4>`;
                    
                    // Sort days in ascending order
                    const sortedDays = Object.keys(groupedEntries[year][month]).sort((a, b) => a - b);
                    
                    sortedDays.forEach(day => {
                        archiveHTML += `<div class="archive-day"><h5>${day}</h5>`;
                        archiveHTML += `<ul style="list-style-type: none; padding-left: 20px;">`;
                        
                        groupedEntries[year][month][day].forEach(entry => {
                            archiveHTML += `
                                <li class="archive-entry" onclick="showSingleEntry('${entry['']}')">
                                    ${entry['TÍTULO'] || 'Untitled'}
                                </li>
                            `;
                        });
                        
                        archiveHTML += `</ul></div>`;
                    });
                    
                    archiveHTML += '</div>';
                });
                
                archiveHTML += '</div>';
            });
            
            archiveHTML += '</div>';
            
            const container = document.getElementById('entries-container');
            container.innerHTML = archiveHTML;
            
            document.querySelector('.nav-buttons').style.display = 'none';
            scrollToTop();
        }

        function handleSearch(event) {
            if (event.key === 'Enter') {
                const searchBox = document.getElementById('search-box');
                const searchTerm = searchBox.value.toLowerCase();
                
                // Hide search box after search
                document.getElementById('search-container').style.display = 'none';
                // Clear search box
                searchBox.value = '';
                
                if (searchTerm.trim() === '') {
                    showHome();
                    return;
                }
                
                const results = allEntries.filter(entry => {
                    return (
                        (entry['TÍTULO'] && entry['TÍTULO'].toLowerCase().includes(searchTerm)) ||
                        (entry['CONTENIDO'] && entry['CONTENIDO'].toLowerCase().includes(searchTerm)) ||
                        (entry['TEMA'] && entry['TEMA'].toLowerCase().includes(searchTerm))
                    );
                });
                
                document.getElementById('main-title').textContent = `Search Results for "${searchTerm}"`;
                
                const container = document.getElementById('entries-container');
                if (results.length === 0) {
                    container.innerHTML = '<p>No results found.</p>';
                } else {
                    container.innerHTML = `
                        <div class="list-view">
                            <h2>Found ${results.length} results</h2>
                            <ul>
                                ${results.map(entry => `
                                    <li onclick="showSingleEntry('${entry['']}')">
                                        ${entry['TÍTULO'] || 'Untitled'}
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    `;
                }
                
                scrollToTop();
            }
        }

        // ... (keep all remaining JavaScript functions) ...
    </script>
</body>
</html>
