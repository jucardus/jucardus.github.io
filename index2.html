<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Display</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .entry {
            margin-bottom: 40px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }
        .meta {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        img {
            max-width: 100%;
            height: auto;
            margin-top: 10px;
        }
        a {
            color: #0066cc;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Database Entries</h1>
    <div id="entries-container"></div>

    <script>
        // Function to fetch and process the CSV data
        async function loadEntries() {
            try {
                const response = await fetch('https://jucardus.github.io/base.csv');
                const csvData = await response.text();
                displayEntries(parseCSV(csvData));
            } catch (error) {
                console.error('Error loading the CSV file:', error);
                document.getElementById('entries-container').innerHTML = 
                    '<p>Error loading entries. Please try again later.</p>';
            }
        }

        // Function to parse CSV data
        function parseCSV(csv) {
            const lines = csv.split('\n');
            const result = [];
            const headers = lines[0].split(',').map(h => h.trim());
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const obj = {};
                const currentline = lines[i].split(',');
                
                for (let j = 0; j < headers.length; j++) {
                    let value = currentline[j] ? currentline[j].trim() : '---';
                    // Handle cases where the value might be wrapped in quotes
                    if (value.startsWith('"') && value.endsWith('"')) {
                        value = value.slice(1, -1);
                    }
                    obj[headers[j]] = value || '---';
                }
                
                result.push(obj);
            }
            
            return result;
        }

        // Function to display entries in the HTML
        function displayEntries(entries) {
            const container = document.getElementById('entries-container');
            
            entries.forEach(entry => {
                const entryDiv = document.createElement('div');
                entryDiv.className = 'entry';
                
                // Create HTML for each field
                const title = document.createElement('h2');
                title.textContent = entry['TÍTULO'] || '---';
                
                const meta = document.createElement('div');
                meta.className = 'meta';
                meta.innerHTML = `
                    ${entry[''] || '---'} | 
                    ${entry['TEMA'] || '---'} | 
                    ${entry['FECHA'] || '---'}
                `;
                
                const content = document.createElement('p');
                content.textContent = entry['CONTENIDO'] || '---';
                
                const link = document.createElement('p');
                if (entry['ENLACE'] && entry['ENLACE'] !== '---') {
                    const linkAnchor = document.createElement('a');
                    linkAnchor.href = entry['ENLACE'];
                    linkAnchor.textContent = 'View more';
                    link.appendChild(linkAnchor);
                } else {
                    link.textContent = '---';
                }
                
                const imageContainer = document.createElement('div');
                if (entry['IMAGEN'] && entry['IMAGEN'] !== '---') {
                    const img = document.createElement('img');
                    img.src = entry['IMAGEN'];
                    img.alt = entry['TÍTULO'] || 'Entry image';
                    imageContainer.appendChild(img);
                } else {
                    imageContainer.textContent = '---';
                }
                
                // Append all elements to the entry div
                entryDiv.appendChild(title);
                entryDiv.appendChild(meta);
                entryDiv.appendChild(content);
                entryDiv.appendChild(link);
                entryDiv.appendChild(imageContainer);
                
                // Add the entry to the container
                container.appendChild(entryDiv);
            });
        }

        // Load entries when the page loads
        window.onload = loadEntries;
    </script>
</body>
</html>
