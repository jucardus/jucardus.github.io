    }
    body {
      font-family: 'Times New Roman', serif;

      padding: 25px 20% 160px 20%;
    }
    .fecha {
      font-size: revert!important;
      opacity: 0.5;
    }
    #mostrar {
      margin-top: 30px!important;
    }
    .numeros {
      color: Green;
    }
    #pie {
      margin-top: 30px!important;
      text-align: center;
    }
  </style>

<body onload='hacer()'>
  <h1>Jucardus.com</h1>
  <h4 style='color: OrangeRed;'>[ EN RECONSTRUCCIÓN ]</h4>
  <div id='mostrar'></div>
  <script>
    function hacer () {
      fetch('= JUCARDUS =_= contenido =.csv')
      .then(response => response.text()) 
      .then(textString => {
        formateo(textString);
      });
    }
    function formateo (recibido) {
      var recibido = recibido.replace(/\n/g,'¶¶¶¶¶');
      var recibido = recibido.replace(/,T,C,E,F\n/g,'').replace(/, /g,'ŧ ').replace(/\"/g,'');
      var resultado = [];
      var arrayContenido = recibido.split('¶¶¶¶¶');
      for (var i = 1; i < arrayContenido.length; i++) {
        var linea = arrayContenido[i].split(',');
          var nmr = linea[0];
            var nmr = '<span class="numeros">' + nmr + '</span> • ';
          var tm = linea[1];
            var tm = '<b>' + tm + '</b>';
          var cntnd = linea[2];
            var cntnd = ' — ' + cntnd;
          var enlc = linea[3];
            if (enlc != '') {var enlc = ' — ' + enlc;}
          var fch = linea[4];
            var fch = ' — <span class="fecha">' + fch + '</span>';
          var nuevaLinea = nmr + tm + cntnd + enlc + fch;
          resultado.push(nuevaLinea);
      }
      var enviar = resultado.join('<p>');
        var enviar = enviar.replace(/— —/g,'—');
      var pie = '<div id="pie">~ • ~</div>';
      document.getElementById('mostrar').innerHTML = enviar + pie;
    }
  </script>
</body>
