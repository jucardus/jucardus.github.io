<body>
    <iframe id="mainFrame" src="https://script.google.com/macros/s/AKfycbwipmL2J3QrrjjzHLQX160N7TA-rq0wyOMNeDtrMqU3F5cfd8yr4l6qkGjsdzOyOgc57A/exec"></iframe>

    <script>
        (function() {
            // Base URL of your Google Apps Script
            const baseUrl = "https://script.google.com/macros/s/AKfycbwipmL2J3QrrjjzHLQX160N7TA-rq0wyOMNeDtrMqU3F5cfd8yr4l6qkGjsdzOyOgc57A/exec";
            
            // Get the 'q' parameter from the URL
            const urlParams = new URLSearchParams(window.location.search);
            const queryValue = urlParams.get('q');
            
            // If there's a 'q' parameter, update the iframe
            if (queryValue && queryValue.trim().length >= 1) {
                const iframe = document.getElementById('mainFrame');
                // Build the new iframe URL with the parameter
                iframe.src = baseUrl + "?q=" + encodeURIComponent(queryValue);
                
                // Clean the browser URL (remove ?q= parameter)
                const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                window.history.replaceState({}, document.title, cleanUrl);
            }
        })();
    </script>
