<body onload='inicio()'>
  <h1>Jucardus.com</h1>
  <div id='temas'>
    <span class='temas' id='inicio' onclick='inicio()'>Inicio</span> ·
    <span class='temas' id='apotegmas' onclick='segunTema("apotegmas")'>Apotegmas</span> ·
    <span class='temas' id='citas' onclick='segunTema("citas")'>Citas</span> ·
    <span class='temas' id='cuentos' onclick='segunTema("cuentos")'>Cuentos</span> ·
    <span class='temas' id='diario' onclick='segunTema("diario")'>Diario</span> ·
    <span class='temas' id='enlaces' onclick='segunTema("enlaces")'>Enlaces</span> ·
    <span class='temas' id='poesia' onclick='segunTema("poesía")'>Poesía</span> ·
    <span class='temas' id='reflexiones' onclick='segunTema("reflexiones")'>Reflexiones</span> ·
    <span class='temas' id='vocabulario' onclick='segunTema("vocabulario")'>Vocabulario</span> ·
    <span class='temas' id='aclaraciones' onclick='aclaraciones()'>Aclaraciones</span> ·
    <span class='temas' id='autor' onclick='autor()'>Autor</span> ·
    <span class='temas' id='lupa' onclick='mostrarBuscador()'>🔍</span>
  </div>
  <div id="buscador">
    <form method="post">
      <input type="text" autofocus="on" autocomplete="off" placeholder="..." size="21" id="buscar" class="buscar" name="buscar" onkeydown="teclaBuscar (event)" />
      <button id="boton" type="button" onclick="buscar()">🔍</button>
    </form>
  </div>
  <div id='mostrar'></div>
  <div id="pie">~ • ~</div>
  <script>
    let texto = '';
    function inicio () {
      fetch('= JUCARDUS =_= contenido =.csv')
      .then(response => response.text()) 
      .then(textString => {
        formateo(textString);
      });
    }
    function formateo (recibido) {
      texto = recibido;
      var contador = 0;
      var recibido = recibido.replace(/,T,C,E,F\n/g,'').replace(/, /g,'ŧ ').replace(/\"/g,'');
      var recibido = recibido.replace(/\n/g,'¶¶¶¶¶');
      var resultado = [];
      var arrayContenido = recibido.split('¶¶¶¶¶');
      for (var i = 0; i < arrayContenido.length; i++) {
        var linea = arrayContenido[i].split(',');
          var nmr = linea[0];
            if (linea[3] == '') {
              var nmr = '<a class="numeros" target="_blank" href="https://x.com/intent/tweet?text=' + linea[0] + '. ' + linea[1] + ' — ' + linea[2] + '%0A%0A@jucardus%20%23">' + nmr + '</a> • ';
            }
            if (linea[3] != '') {
              var nmr = '<a class="numeros" target="_blank" href="https://x.com/intent/tweet?text=' + linea[0] + '. ' + linea[1] + ' — ' + linea[2] + ' → ' + linea[3] + '%0A%0A@jucardus%20%23">' + nmr + '</a> • ';
            }
          var tm = linea[1];
            var tm = '<span class="temas" onclick="segunTema(\'' + tm?.replace(/ .*/g,'').toLowerCase() + '\')"><b>' + tm + '</b></span>';
          var cntnd = linea[2];
            var cntnd = ' — ' + cntnd;
          var enlc = linea[3];
            if (enlc != '') {
              var dominio = enlc?.slice(enlc.indexOf('://') + 3).replace(/\/.*/g,'');
              var enlc = ' — <a class="enlacista" href="' + enlc + '" target="_blank">' + dominio + '</a>';
            } else {enlc = '';}
          var fch = linea[4];
            var fch = ' <span class="fecha">  — ' + fch?.slice(2) + '</span>';
          var nuevaLinea = nmr + tm + cntnd + enlc + fch;
          if (tm != '<b>undefined</b>') {
            resultado.push(nuevaLinea);
            contador = contador + 1;
              if (contador == 20) {break;}
          }
      }
      var enviar = resultado.join('<p>');
        var enviar = enviar.replace(/ŧ /g,', ');
      document.getElementById('mostrar').innerHTML = enviar;
      subrayar('inicio');
      window.scrollTo(0, 0);
    }
    function autor() {
      var contenidoAutor = "<ul><li><b>Autor:</b> Julio Cárdenas Pelizzari ©</li><li><b>Contacto:</b> jucardus en gmail punto com</li><li><b>Donaciones:</b> pp.jucardus.com</li><li><b>Invitación a pCloud:</b> i.jucardus.com</li><li><b>Facebook:</b> fb.jucardus.com</li><li><b>X Twitter:</b> x.jucardus.com</li></ul>";
      document.getElementById('mostrar').innerHTML = contenidoAutor;
      subrayar('autor');
      window.scrollTo(0, 0);
    }
    function aclaraciones() {
      var aclaraciones = "<ul><li>La página de inicio, y todos los temas, muestran las veinte entradas más recientes.</li><li>Clica en la lupa para buscar entre todas las entradas del sitio, sin límite de coincidencias.</li><li>Clica en los números verdes para compartir el párrafo en X Twitter.</li><li>Si deseas hacer comentarios, críticas o correcciones a mi contenido, sírvete escribir a jucardus en gmail punto com.</li></ul>";;
      document.getElementById('mostrar').innerHTML = aclaraciones;
      subrayar('aclaraciones');
      window.scrollTo(0, 0);
    }
    function segunTema (temaRecibido) {
      var recibido = texto;
      var contador = 0;
      var recibido = recibido.replace(/,T,C,E,F\n/g,'').replace(/, /g,'ŧ ').replace(/\"/g,'');
      var recibido = recibido.replace(/\n/g,'¶¶¶¶¶');
      var resultado = [];
      var arrayContenido = recibido.split('¶¶¶¶¶');
      for (var i = 0; i < arrayContenido.length; i++) {
        var linea = arrayContenido[i].split(',');
          var nmr = linea[0];
            if (linea[3] == '') {
              var nmr = '<a class="numeros" target="_blank" href="https://x.com/intent/tweet?text=' + linea[0] + '. ' + linea[1] + ' — ' + linea[2] + '%0A%0A@jucardus%20%23">' + nmr + '</a> • ';
            }
            if (linea[3] != '') {
              var nmr = '<a class="numeros" target="_blank" href="https://x.com/intent/tweet?text=' + linea[0] + '. ' + linea[1] + ' — ' + linea[2] + ' → ' + linea[3] + '%0A%0A@jucardus%20%23">' + nmr + '</a> • ';
            }
          var tm = linea[1];
            var tm = '<b>' + tm + '</b>';
          var cntnd = linea[2];
            var cntnd = ' — ' + cntnd;
          var enlc = linea[3];
            if (enlc != '') {
              var dominio = enlc?.slice(enlc.indexOf('://') + 3).replace(/\/.*/g,'');
              var enlc = ' — <a class="enlacista" href="' + enlc + '" target="_blank">' + dominio + '</a>';
            } else {enlc = '';}
          var fch = linea[4];
            var fch = ' <span class="fecha">  — ' + fch?.slice(2) + '</span>';
          var nuevaLinea = nmr + tm + cntnd + enlc + fch;
          if (tm.toUpperCase().indexOf(temaRecibido.toUpperCase()) >= 0) {
            resultado.push(nuevaLinea);
            contador = contador + 1;
              if (contador == 20) {break;}
          }
      }
      var enviar = resultado.join('<p>');
        var enviar = enviar.replace(/ŧ /g,', ');
      document.getElementById('mostrar').innerHTML = enviar;
      subrayar(temaRecibido);
      window.scrollTo(0, 0);
    }
    function subrayar (temaSubrayar) {
      var fondoNoClicados = '4px solid White';
      const temasTodos = document.getElementsByClassName('temas');
      for (let i = 0; i < temasTodos.length; i++) {
        temasTodos[i].style.borderBottom = fondoNoClicados;
      }
      if (temaSubrayar == 'poesía') {temaSubrayar = 'poesia';}
      document.getElementById(temaSubrayar).style.borderBottom = '4px solid Orange';
    }
    function mostrarBuscador () {
      document.getElementById('buscador').style.display = 'block';
      document.getElementById('buscar').focus();
    }
    function teclaBuscar (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        buscar('');
      }
    }
    function buscar () {
      let lema = document.getElementById("buscar").value.toUpperCase();
      var recibido = texto;
      var recibido = recibido.replace(/,T,C,E,F\n/g,'').replace(/, /g,'ŧ ').replace(/\"/g,'');
      var recibido = recibido.replace(/\n/g,'¶¶¶¶¶');
      var resultadoBusca = [];
      var arrayContenido = recibido.split('¶¶¶¶¶');
      for (var i = 0; i < arrayContenido.length; i++) {
        if (arrayContenido[i].toUpperCase().indexOf(lema) >= 0 && lema.length >= 2) {
          var linea = arrayContenido[i].split(',');
            var nmr = linea[0];
              if (linea[3] == '') {
                var nmr = '<a class="numeros" target="_blank" href="https://x.com/intent/tweet?text=' + linea[0] + '. ' + linea[1] + ' — ' + linea[2] + '%0A%0A@jucardus%20%23">' + nmr + '</a> • ';
              }
              if (linea[3] != '') {
                var nmr = '<a class="numeros" target="_blank" href="https://x.com/intent/tweet?text=' + linea[0] + '. ' + linea[1] + ' — ' + linea[2] + ' → ' + linea[3] + '%0A%0A@jucardus%20%23">' + nmr + '</a> • ';
              }
            var tm = linea[1];
              var tm = '<b>' + tm + '</b>';
            var cntnd = linea[2];
              var cntnd = ' — ' + cntnd;
            var enlc = linea[3];
              if (enlc != '') {
                var dominio = enlc?.slice(enlc.indexOf('://') + 3).replace(/\/.*/g,'');
                var enlc = ' — <a class="enlacista" href="' + enlc + '" target="_blank">' + dominio + '</a>';
              } else {enlc = '';}
            var fch = linea[4];
              var fch = ' <span class="fecha">  — ' + fch?.slice(2) + '</span>';
            var nuevaLineaBusca = nmr + tm + cntnd + enlc + fch;
            resultadoBusca.push(nuevaLineaBusca);
        }
      }
      var enviar = resultadoBusca.join('<p>');
        var enviar = enviar.replace(/ŧ /g,', ');
      if (enviar.indexOf('<') == -1) {enviar = '&#12288;<span style="color: OrangeRed;">[ ninguna coincidencia ]</span>';}
      document.getElementById('mostrar').innerHTML = enviar;
      document.getElementById('buscar').value = '';
      document.getElementById('buscador').style.display = 'none';
      var fondoNoClicados = '4px solid White';
      const temasTodos = document.getElementsByClassName('temas');
      for (let i = 0; i < temasTodos.length; i++) {
        temasTodos[i].style.borderBottom = fondoNoClicados;
      }
      window.scrollTo(0, 0);
    }
  </script>
</body>
