<body onload='inicio()'>
  <h1>Jucardus.com</h1>
  <div id='temas'>
    <span class='temas' id='inicio' onclick='inicio()'>Inicio</span> ·
    <span class='temas' id='apotegmas' onclick='segunTema("apotegmas")'>Apotegmas</span> ·
    <span class='temas' id='citas' onclick='segunTema("citas")'>Citas</span> ·
    <span class='temas' id='cuentos' onclick='segunTema("cuentos")'>Cuentos</span> ·
    <span class='temas' id='diario' onclick='segunTema("diario")'>Diario</span> ·
    <span class='temas' id='enlaces' onclick='segunTema("enlaces")'>Enlaces</span> ·
    <span class='temas' id='poesia' onclick='segunTema("poesía")'>Poesía</span> ·
    <span class='temas' id='reflexiones' onclick='segunTema("reflexiones")'>Reflexiones</span> ·
    <span class='temas' id='sinonimos' onclick='segunTema("sinónimos")'>Sinónimos</span> ·
    <span class='temas' id='vocabulario' onclick='segunTema("vocabulario")'>Vocabulario</span> ·
    <span class='temas' id='aclaraciones' onclick='aclaraciones()'>Aclaraciones</span> ·
    <span class='temas' id='autor' onclick='autor()'>Autor</span> ·
    🔍
  </div>
  <div id='mostrar'></div>
  <div id="pie">~ • ~</div>
  <script>
    let texto = '';
    function inicio () {
      fetch('= JUCARDUS =_= contenido =.csv')
      .then(response => response.text()) 
      .then(textString => {
        formateo(textString);
      });
    }
    function formateo (recibido) {
      texto = recibido;
      var recibido = recibido.replace(/,T,C,E,F\n/g,'').replace(/, /g,'ŧ ').replace(/\"/g,'');
      var recibido = recibido.replace(/\n/g,'¶¶¶¶¶');
        let string = recibido;
        let searchString = '¶¶¶¶¶';
        let occurrence = 20;
        let regex = new RegExp(searchString, 'g');
        let matches = Array.from(string.matchAll(regex));
        if(matches.length >= occurrence) {
          let nthIndex = matches[occurrence - 1].index;
          var recibido = recibido.slice(0,nthIndex);
        } else {}
      var resultado = [];
      var arrayContenido = recibido.split('¶¶¶¶¶');
      for (var i = 0; i < arrayContenido.length; i++) {
        var linea = arrayContenido[i].split(',');
          var nmr = linea[0];
            var nmr = '<a class="numeros" target="_blank" href="https://x.com/intent/tweet?text=' + linea[0] + '. ' + linea[1] + ' — ' + linea[2] + '%0A%0A@jucardus%20%23">' + nmr + '</a> • ';
          var tm = linea[1];
            var tm = '<span class="temas" onclick="segunTema(\'<b>' + tm.replace(/ .*/g,'') + '\')"><b>' + tm + '</b></span>';
          var cntnd = linea[2];
            var cntnd = ' — ' + cntnd;
          var enlc = linea[3];
            if (enlc != '') {var enlc = ' — ' + enlc;}
          var fch = linea[4];
            var fch = ' <span class="fecha">  — ' + fch?.slice(2) + '</span>';
          var nuevaLinea = nmr + tm + cntnd + enlc + fch;
          if (tm != '<b>undefined</b>') {
            resultado.push(nuevaLinea);
          }
      }
      var enviar = resultado.join('<p>');
        var enviar = enviar.replace(/ŧ /g,', ');
      document.getElementById('mostrar').innerHTML = enviar;
      subrayar('inicio');
      window.scrollTo(0, 0);
    }
    function autor() {
      var contenidoAutor = "<ul><li><b>Autor:</b> Julio Cárdenas Pelizzari ©</li><li><b>Contacto:</b> jucardus en gmail punto com</li><li><b>Donaciones:</b> pp.jucardus.com</li><li><b>Invitación a pCloud:</b> i.jucardus.com</li><li><b>Facebook:</b> fb.jucardus.com</li><li><b>X Twitter:</b> x.jucardus.com</li></ul>";
      document.getElementById('mostrar').innerHTML = contenidoAutor;
      subrayar('autor');
      window.scrollTo(0, 0);
    }
    function aclaraciones() {
      var aclaraciones = "<ul><li>La página de inicio muestra las veinte entradas más recientes.</li><li>Clica en los temas para ver todas las entradas.</li><li>Clica en los números verdes para compartir el párrafo en X Twitter.</li></ul>";
      document.getElementById('mostrar').innerHTML = aclaraciones;
      subrayar('aclaraciones');
      window.scrollTo(0, 0);
    }
    function segunTema (temaRecibido) {
      var recibido = texto;
      var recibido = recibido.replace(/,T,C,E,F\n/g,'').replace(/, /g,'ŧ ').replace(/\"/g,'');
      var recibido = recibido.replace(/\n/g,'¶¶¶¶¶');
      var resultado = [];
      var arrayContenido = recibido.split('¶¶¶¶¶');
      for (var i = 0; i < arrayContenido.length; i++) {
        var linea = arrayContenido[i].split(',');
          var nmr = linea[0];
            var nmr = '<a class="numeros" target="_blank" href="https://x.com/intent/tweet?text=' + linea[0] + '. ' + linea[1] + ' — ' + linea[2] + '%0A%0A@jucardus%20%23">' + nmr + '</a> • ';
          var tm = linea[1];
            var tm = '<b>' + tm + '</b>';
          var cntnd = linea[2];
            var cntnd = ' — ' + cntnd;
          var enlc = linea[3];
            if (enlc != '') {var enlc = ' — ' + enlc;}
          var fch = linea[4];
            var fch = ' <span class="fecha">  — ' + fch?.slice(2) + '</span>';
          var nuevaLinea = nmr + tm + cntnd + enlc + fch;
          if (tm.toUpperCase().indexOf(temaRecibido.toUpperCase()) >= 0) {
            resultado.push(nuevaLinea);
          }
      }
      var enviar = resultado.join('<p>');
        var enviar = enviar.replace(/ŧ /g,', ');
      document.getElementById('mostrar').innerHTML = enviar;
      subrayar(temaRecibido);
      window.scrollTo(0, 0);
    }
    function subrayar (temaSubrayar) {
      var fondoNoClicados = '4px solid White';
        document.getElementById('inicio').style.borderBottom = fondoNoClicados;
        document.getElementById('apotegmas').style.borderBottom = fondoNoClicados;
        document.getElementById('citas').style.borderBottom = fondoNoClicados;
        document.getElementById('cuentos').style.borderBottom = fondoNoClicados;
        document.getElementById('diario').style.borderBottom = fondoNoClicados;
        document.getElementById('enlaces').style.borderBottom = fondoNoClicados;
        document.getElementById('poesia').style.borderBottom = fondoNoClicados;
        document.getElementById('reflexiones').style.borderBottom = fondoNoClicados;
        document.getElementById('sinonimos').style.borderBottom = fondoNoClicados;
        document.getElementById('vocabulario').style.borderBottom = fondoNoClicados;
        document.getElementById('aclaraciones').style.borderBottom = fondoNoClicados;
        document.getElementById('autor').style.borderBottom = fondoNoClicados;
      if (temaSubrayar == 'poesía') {temaSubrayar = 'poesia';}
      if (temaSubrayar == 'sinónimos') {temaSubrayar = 'sinonimos';}
      document.getElementById(temaSubrayar).style.borderBottom = '4px solid Orange';
    }
  </script>
</body>
