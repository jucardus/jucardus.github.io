<body onload='inicio()'>
  <h1>Jucardus.com</h1>
  <div id='temas'>
    <span class='temas' onclick='inicio()'>Inicio</span> ·
    <span class='temas' onclick='segunTema("<b>Apotegmas")'>Apotegmas</span> ·
    <span class='temas' onclick='segunTema("<b>Citas")'>Citas</span> ·
    <span class='temas' onclick='segunTema("<b>Cuentos")'>Cuentos</span> ·
    <span class='temas' onclick='segunTema("<b>Diario")'>Diario</span> ·
    <span class='temas' onclick='segunTema("<b>Enlaces")'>Enlaces</span> ·
    <span class='temas' onclick='segunTema("<b>Poesía")'>Poesía</span> ·
    <span class='temas' onclick='segunTema("<b>Reflexiones")'>Reflexiones</span> ·
    <span class='temas' onclick='segunTema("<b>Sinónimos")'>Sinónimos</span> ·
    <span class='temas' onclick='segunTema("<b>Vocabulario")'>Vocabulario</span> ·
    <span class='temas' onclick='autor()'>Autor</span> ·
    🔍
  </div>
  <div id='mostrar'></div>
  <div id="pie">~ • ~</div>
  <script>
    let texto = '';
    function inicio () {
      fetch('= JUCARDUS =_= contenido =.csv')
      .then(response => response.text()) 
      .then(textString => {
        formateo(textString);
      });
    }
    function formateo (recibido) {
      texto = recibido;
      var recibido = recibido.replace(/,T,C,E,F\n/g,'').replace(/, /g,'ŧ ').replace(/\"/g,'');
      var recibido = recibido.replace(/\n/g,'¶¶¶¶¶');
        let string = recibido;
        let searchString = '¶¶¶¶¶';
        let occurrence = 20;
        let regex = new RegExp(searchString, 'g');
        let matches = Array.from(string.matchAll(regex));
        if(matches.length >= occurrence) {
          let nthIndex = matches[occurrence - 1].index;
          var recibido = recibido.slice(0,nthIndex);
        } else {}
      var resultado = [];
      var arrayContenido = recibido.split('¶¶¶¶¶');
      for (var i = 0; i < arrayContenido.length; i++) {
        var linea = arrayContenido[i].split(',');
          var nmr = linea[0];
            var nmr = '<a class="numeros" target="_blank" href="https://x.com/intent/tweet?text=' + linea[0] + '. ' + linea[1] + ' — ' + linea[2] + '%0A%0A@jucardus%20%23">' + nmr + '</a> • ';
          var tm = linea[1];
            var tm = '<span class="temas" onclick="segunTema(\'<b>' + tm.replace(/ .*/g,'') + '\')"><b>' + tm + '</b></span>';
          var cntnd = linea[2];
            var cntnd = ' — ' + cntnd;
          var enlc = linea[3];
            if (enlc != '') {var enlc = ' — ' + enlc;}
          var fch = linea[4];
            var fch = ' <span class="fecha">  — ' + fch?.slice(2) + '</span>';
          var nuevaLinea = nmr + tm + cntnd + enlc + fch;
          if (tm != '<b>undefined</b>') {
            resultado.push(nuevaLinea);
          }
      }
      var enviar = resultado.join('<p>');
        var enviar = enviar.replace(/ŧ /g,', ');
      document.getElementById('mostrar').innerHTML = enviar + '<p><small>... clica en los temas para ver todas las entradas ...</small>';
      window.scrollTo(0, 0);
    }
    function autor() {
      var contenidoAutor = "<span id='contenidoAutor'><b>Autor:</b> Julio Cárdenas Pelizzari ©<br/><b>Contacto:</b> jucardus en gmail punto com<br/><b>Donaciones:</b> pp.jucardus.com<br/><b>Invitación a pCloud:</b> i.jucardus.com<br/><b>Facebook:</b> fb.jucardus.com<br/><b>X Twitter:</b> x.jucardus.com</span>";
      document.getElementById('mostrar').innerHTML = contenidoAutor;
      window.scrollTo(0, 0);
    }
    function segunTema (temaRecibido) {
      var recibido = texto;
      var recibido = recibido.replace(/,T,C,E,F\n/g,'').replace(/, /g,'ŧ ').replace(/\"/g,'');
      var recibido = recibido.replace(/\n/g,'¶¶¶¶¶');
      var resultado = [];
      var arrayContenido = recibido.split('¶¶¶¶¶');
      for (var i = 0; i < arrayContenido.length; i++) {
        var linea = arrayContenido[i].split(',');
          var nmr = linea[0];
            var nmr = '<span class="numeros">' + nmr + '</span> • ';
          var tm = linea[1];
            var tm = '<b>' + tm + '</b>';
          var cntnd = linea[2];
            var cntnd = ' — ' + cntnd;
          var enlc = linea[3];
            if (enlc != '') {var enlc = ' — ' + enlc;}
          var fch = linea[4];
            var fch = ' <span class="fecha">  — ' + fch?.slice(2) + '</span>';
          var nuevaLinea = nmr + tm + cntnd + enlc + fch;
          if (tm.indexOf(temaRecibido) >= 0) {
            resultado.push(nuevaLinea);
          }
      }
      var enviar = resultado.join('<p>');
        var enviar = enviar.replace(/ŧ /g,', ');
      document.getElementById('mostrar').innerHTML = enviar;
      window.scrollTo(0, 0);
    }
  </script>
</body>
