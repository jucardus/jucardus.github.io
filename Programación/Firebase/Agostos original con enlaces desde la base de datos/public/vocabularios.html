<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta name="keywords" content="vocabulario, vocabulario español, vocabulario inglés, vocabulario francés, español, inglés, francés">
    <meta name="description" content="Vocabulario español, francés, español">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" type="image/jpg" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    <title>Vocabulario - AGOSTOS</title>
  </head>
  <body>

    <h2>Vocabulario español, francés, inglés</h2>

    <div id = "mostrar"></div>

<script type="module">

    document.getElementById('mostrar').innerHTML = '<span id="previo">&#12288;c a r g a n d o . . .</span>';

    import {getFirestore,collection,getDocs} from "https://www.gstatic.com/firebasejs/9.9.3/firebase-firestore.js";

//============================================================================

  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.9.3/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.9.3/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDZ9e0jo8cLf9DDtVcOAGqlaA5OevC5I-I",
    authDomain: "agostos.firebaseapp.com",
    projectId: "agostos",
    storageBucket: "agostos.appspot.com",
    messagingSenderId: "433924791688",
    appId: "1:433924791688:web:0d5e677255c16a26b86e3d",
    measurementId: "G-CJLNHKJEKD"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);

//==============================================================================

	const db = getFirestore(app);

	window.onload = LeerMostrar();

	async function LeerMostrar()
	{
		let datos = [];
		let value = '';
        let array = [];

		const referencia = collection(db, "vocabularios");

		try {
			datos = await getDocs(referencia);
		} catch(err) {
			console.log('mensaje en caso de error', err)
		}

		datos.forEach(elemento =>
		{
            var dominio = elemento.data().e;
                var dominio = dominio.slice(dominio.indexOf('://')+3);
                var dominio = dominio.slice(0,dominio.indexOf('/'));
            var favicon = 'https://www.google.com/s2/favicons?domain=' + dominio;
            value = '<!--' + elemento.id + '--><img src="' + favicon + '"></img> <a href="' + elemento.data().e + '" target="_blank">' + elemento.id + ' | ' + dominio + '</a>';
            array.push(value);
		});
        array.sort((a,b) => a.localeCompare(b));
		var enviar = array.join('<p>');
		document.getElementById('mostrar').innerHTML = enviar;
	}

</script>

</body>
</html>
