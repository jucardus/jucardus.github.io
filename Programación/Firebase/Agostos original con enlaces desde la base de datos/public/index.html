<script type="module">

    document.getElementById('mostrar').innerHTML = '<span id="previo">c a r g a n d o</span>';

    import {getFirestore,collection,getDocs} from "https://www.gstatic.com/firebasejs/9.9.3/firebase-firestore.js";

//============================================================================

  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.9.3/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.9.3/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDZ9e0jo8c",
    authDomain: "agostos.firebaseapp.com",
    projectId: "agostos",
    storageBucket: "agostos.appspot.com",
    messagingSenderId: "433924791688",
    appId: "1:433924791688:web:0d5e677",
    measurementId: "G-CJLNHKJEKD"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);

//==============================================================================

	const db = getFirestore(app);
	window.onload = LeerMostrar();

	async function LeerMostrar()
	{
		let datos = [];
		let value = '';

		const referencia = collection(db, "agostos");

		try {
			datos = await getDocs(referencia);
		} catch(err) {
			console.log('mensaje en caso de error', err)
		}

		datos.forEach(elemento =>
		{
            value += '<a href="' + elemento.data().e + '" target="_blank">' + elemento.id + '</a><p>';
		});
        var valores = value.replace(/·/g,'•');
		document.getElementById('mostrar').innerHTML = valores;
	}
	</script>
