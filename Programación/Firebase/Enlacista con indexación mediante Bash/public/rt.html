<!DOCTYPE html>
<!--Twitter - Retuitador a partir de la URL.-->
<html>
<body onload="hacer()">
<script>
function hacer() {
    var recibido = window.location.href.replace(/.*enlacista\.web\.app\/rt\?=/g,'');
    var array = recibido.split('---');
    var texto = array[0];
    var url = array[1];
    var linea = texto + '%0D%0D%E2%9C%B6 ' + url + ' %E2%9C%B6%0D%0D%23rjucardus%20%23cjucardus';
    var tuitear = 'https://twitter.com/intent/tweet?text=' + linea;
    window.location.replace(tuitear);
    }
</script>
</body>
</html>
