<!DOCTYPE html>
<!--Enlacista - Eliminación de enlaces en Enlacista mediante parameter en GAS.-->
<html>
<body onload="hacer()">
<script>
function hacer() {
    var enlace = window.location.href.replace(/.*enlacista\.web\.app\/eb\?=/g,'');
    var crear = 'https://script.google.com/macros/s/AKfycbyxkilYZ_wlb3pWzkfl9j6fTlmvzwGYIuyECVWdJYPAg58AxS3MQ_S2SRbYxUq6HjHeYQ/exec?q=' + enlace;
    window.location.replace(crear);
}
</script>
</body>
</html>
