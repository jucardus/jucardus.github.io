<html>

<body onload = "generar()">

<script type="text/javascript">

function generar() {

  let array = ["tch","tes","tfr","tin"];

  var resultado = shuffle(array).slice(1,2).join('');
  if (resultado == 'tch') {window.location.href = 'tch.html';}
  if (resultado == 'tes') {window.location.href = 'tes.html';}
  if (resultado == 'tfr') {window.location.href = 'tfr.html';}
  if (resultado == 'tin') {window.location.href = 'tin.html';}

}

function shuffle(array) {

  let currentIndex = array.length, randomIndex;
  while (currentIndex > 0) {
    randomIndex = Math.floor(Math.random() * currentIndex);
    currentIndex--;
    [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
  }
  return array;

}

</script>

</body>

</html>
