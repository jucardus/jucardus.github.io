<!DOCTYPE html>
<!--YouTube - Búsqueda directa en YouTube.-->
<html>
<body onload="ejecutable()">
<script>
function ejecutable() {
    var busca = window.location.href.replace(/.*enlacista\.web\.app\/yt\?=/g,'');
    var abrir = 'https://www.youtube.com/results?search_query=' + busca;
    window.location.replace(abrir);
}
</script>
</body>
</html>
