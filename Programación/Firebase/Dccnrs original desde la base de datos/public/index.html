    <h2>Diccionarios varios <small><small>&#8212; <a href="https://agostos.web.app" target="_blank">agostos.web.app</a></small></small></h2>

    <div id = "mostrar"></div>

<script type="module">

    document.getElementById('mostrar').innerHTML = '<span id="previo">&#12288;c a r g a n d o . . .</span>';

    import {getFirestore,collection,getDocs} from "https://www.gstatic.com/firebasejs/9.9.3/firebase-firestore.js";

//============================================================================

  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.9.3/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.9.3/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDgz",
    authDomain: "dccnrs.firebaseapp.com",
    projectId: "dccnrs",
    storageBucket: "dccnrs.appspot.com",
    messagingSenderId: "1036227478429",
    appId: "1:103622749:web:888",
    measurementId: "G-FGMEHFSB66"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);

//==============================================================================

	const db = getFirestore(app);

	window.onload = LeerMostrar();

	async function LeerMostrar()
	{
		let datos = [];
		let value = '';
        let array = [];

		const referencia = collection(db, "dccnrs-db");

		try {
			datos = await getDocs(referencia);
		} catch(err) {
			console.log('mensaje en caso de error', err)
		}

		datos.forEach(elemento =>
		{
            var dominio = elemento.data().e;
                var dominio = dominio.slice(dominio.indexOf('://')+3);
                var dominio = dominio.slice(0,dominio.indexOf('/'));
            var favicon = 'https://www.google.com/s2/favicons?domain=' + dominio;
            value = '<li><!--' + elemento.id + '--><a href="' + elemento.data().e + '" target="_blank">' + elemento.id + '</a></li>';
            array.push(value);
		});
        array.sort((a,b) => a.localeCompare(b));
		var enviar = array.join('');
		document.getElementById('mostrar').innerHTML = '<ul>' + enviar + '</ul>';
	}
	</script>
