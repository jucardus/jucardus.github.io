<!DOCTYPE html>
<html>
<head>
    <title>Parent Page</title>
</head>
<body>
    <iframe id="gasFrame" src="https://script.google.com/macros/s/AKfycbwjlS__4R_Pcw965CUcvUxdN2Lx2gAp_XQj0c7BSxAIa5DS7C1eew74UzunFWryBiKl1g/exec"></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const queryValue = urlParams.get('q');
        
        const iframe = document.getElementById('gasFrame');
        
        window.addEventListener('message', function(event) {
            if (event.data.type === 'IFRAME_READY') {
                if (queryValue) {
                    iframe.contentWindow.postMessage({type: 'QUERY', value: queryValue}, '*');
                }
            }
        });
        
        // Fallback: send after 1 second anyway
        setTimeout(function() {
            if (queryValue) {
                iframe.contentWindow.postMessage({type: 'QUERY', value: queryValue}, '*');
            }
        }, 1000);
    </script>
</body>
</html>
