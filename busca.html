<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="Buscar en todas las entradas de Jucardus.com">
    <meta name="author" content="Jucardus ©">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <title>Búsqueda | Jucardus.com</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            margin-bottom: 20px;
        }
        
        #searchBox {
            width: 300px;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        #searchBox:focus {
            outline: none;
            border-color: #666;
        }
        
        #results {
            list-style: none;
        }
        
        #results li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        #results li a {
            text-decoration: none;
            color: #0066cc;
            font-weight: 500;
        }
        
        #results li a:hover {
            text-decoration: underline;
        }
        
        .labels {
            color: #666;
            font-size: 12px;
            margin-left: 8px;
        }
        
        .no-results {
            color: #666;
            font-style: italic;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Buscar</h1>
    
    <input type="text" id="searchBox" placeholder="Buscar..." autocomplete="off">
    
    <ul id="results"></ul>

    <script>
        let entradasArray = [];
        
        function parseEntry(entryString) {
            try {
                let clean = entryString.trim();
                if (clean.endsWith(',')) {
                    clean = clean.slice(0, -1);
                }
                
                const startF = clean.indexOf('▓');
                const dash = clean.indexOf('–');
                const endLabel = clean.indexOf('▒');
                const endF = clean.lastIndexOf('▓');
                
                if (startF === -1 || dash === -1 || endLabel === -1 || endF === -1) {
                    return null;
                }
                
                const title = clean.substring(startF + 1, dash).trim();
                const labels = clean.substring(dash + 1, endLabel).trim();
                const url = clean.substring(endLabel + 1, endF).trim();
                
                return { title, labels, url };
            } catch(e) {
                return null;
            }
        }
        
        function loadEntradas() {
            fetch('/entradas.js?' + Date.now())
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to load');
                    }
                    return response.text();
                })
                .then(data => {
                    const arrayStart = data.indexOf('[');
                    const arrayEnd = data.lastIndexOf(']');
                    
                    if (arrayStart === -1 || arrayEnd === -1) {
                        throw new Error('Invalid format');
                    }
                    
                    let arrayContent = data.substring(arrayStart + 1, arrayEnd);
                    
                    const entries = [];
                    let currentEntry = '';
                    let inEntry = false;
                    
                    for (let i = 0; i < arrayContent.length; i++) {
                        const char = arrayContent[i];
                        
                        if (char === '▓') {
                            if (!inEntry) {
                                inEntry = true;
                                currentEntry = '▓';
                            } else {
                                currentEntry += '▓';
                                entries.push(currentEntry);
                                currentEntry = '';
                                inEntry = false;
                            }
                        } else if (inEntry) {
                            currentEntry += char;
                        }
                    }
                    
                    entradasArray = [];
                    for (let i = 0; i < entries.length; i++) {
                        const parsed = parseEntry(entries[i]);
                        if (parsed) {
                            entradasArray.push(parsed);
                        }
                    }
                })
                .catch(error => {
                    console.error('Error loading entries:', error);
                });
        }
        
        function performSearch() {
            const searchBox = document.getElementById('searchBox');
            const resultsContainer = document.getElementById('results');
            const searchTerm = searchBox.value.toLowerCase().trim();
            
            resultsContainer.innerHTML = '';
            
            if (searchTerm === '' || entradasArray.length === 0) {
                return;
            }
            
            const matches = [];
            for (let i = 0; i < entradasArray.length; i++) {
                const entry = entradasArray[i];
                const titleLower = entry.title.toLowerCase();
                const labelsLower = entry.labels.toLowerCase();
                
                if (titleLower.includes(searchTerm) || labelsLower.includes(searchTerm)) {
                    matches.push(entry);
                }
            }
            
            if (matches.length === 0) {
                const li = document.createElement('li');
                li.className = 'no-results';
                li.textContent = 'No se encontraron resultados';
                resultsContainer.appendChild(li);
            } else {
                for (let i = 0; i < matches.length; i++) {
                    const match = matches[i];
                    const li = document.createElement('li');
                    
                    const link = document.createElement('a');
                    link.href = match.url;
                    link.textContent = match.title;
                    
                    const labelsSpan = document.createElement('span');
                    labelsSpan.className = 'labels';
                    labelsSpan.textContent = `🏷️ ${match.labels}`;
                    
                    li.appendChild(link);
                    li.appendChild(labelsSpan);
                    resultsContainer.appendChild(li);
                }
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadEntradas();
            
            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
        });
    </script>
</body>
</html>
