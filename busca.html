<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="Buscar en todas las entradas de Jucardus.com">
    <meta name="author" content="Jucardus ©">
    <meta name="keywords" content="búsqueda, buscar, search, entradas, índice">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <title>Búsqueda | Jucardus.com</title>
    <style>
        /* Minimal styles for search functionality */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            margin-bottom: 20px;
        }
        
        #searchBox {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        #searchBox:focus {
            outline: none;
            border-color: #666;
        }
        
        #results {
            list-style: none;
        }
        
        #results li {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        
        #results li a {
            text-decoration: none;
            color: #0066cc;
        }
        
        #results li a:hover {
            text-decoration: underline;
        }
        
        .no-results {
            color: #666;
            font-style: italic;
        }
        
        .count {
            margin-bottom: 15px;
            font-size: 14px;
            color: #666;
        }
        
        .loading {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>Buscar en las entradas</h1>
    
    <input type="text" id="searchBox" placeholder="Escribe para buscar..." autocomplete="off">
    
    <div class="count" id="count"></div>
    
    <ul id="results">
        <li class="loading">Cargando entradas...</li>
    </ul>

    <script>
        // Global variable to store entries
        let entradasArray = [];
        
        // Function to parse entradas from the loaded script content
        function loadEntradas() {
            // Fetch the entradas.js file directly
            fetch('/entradas.js')
                .then(response => response.text())
                .then(data => {
                    // Extract the array using regex
                    const match = data.match(/const entradas = \[([\s\S]*?)\];/);
                    if (match) {
                        // Parse the array content
                        const arrayContent = match[1];
                        // Use Function constructor to safely evaluate the array
                        const parsedArray = new Function('return [' + arrayContent + ']')();
                        entradasArray = parsedArray;
                        
                        // Clear loading message
                        const resultsContainer = document.getElementById('results');
                        resultsContainer.innerHTML = '';
                        
                        // Optional: Show total count
                        const countDiv = document.getElementById('count');
                        countDiv.textContent = `${entradasArray.length} entradas disponibles`;
                        
                        // Perform initial search (empty search shows nothing)
                        performSearch();
                    } else {
                        throw new Error('Could not parse entradas array');
                    }
                })
                .catch(error => {
                    console.error('Error loading entradas.js:', error);
                    const resultsContainer = document.getElementById('results');
                    resultsContainer.innerHTML = '<li class="no-results">Error al cargar las entradas. Asegúrate de que el archivo entradas.js existe.</li>';
                });
        }
        
        // Function to perform search
        function performSearch() {
            const searchBox = document.getElementById('searchBox');
            const resultsContainer = document.getElementById('results');
            const countDiv = document.getElementById('count');
            
            const searchTerm = searchBox.value.toLowerCase().trim();
            
            // Clear previous results
            resultsContainer.innerHTML = '';
            
            // If search term is empty, show nothing but keep count
            if (searchTerm === '') {
                countDiv.innerHTML = `${entradasArray.length} entradas disponibles`;
                return;
            }
            
            // Filter entries
            const matches = [];
            
            for (let i = 0; i < entradasArray.length; i++) {
                const entry = entradasArray[i];
                // Parse the entry format: "▓title – labels▒url▓"
                const parsed = parseEntry(entry);
                if (parsed) {
                    const titleLower = parsed.title.toLowerCase();
                    const labelsLower = parsed.labels.toLowerCase();
                    
                    if (titleLower.includes(searchTerm) || labelsLower.includes(searchTerm)) {
                        matches.push(parsed);
                    }
                }
            }
            
            // Update count
            const count = matches.length;
            countDiv.innerHTML = count === 1 
                ? `1 resultado encontrado (de ${entradasArray.length} entradas)`
                : `${count} resultados encontrados (de ${entradasArray.length} entradas)`;
            
            // Display results
            if (matches.length === 0) {
                const li = document.createElement('li');
                li.className = 'no-results';
                li.textContent = 'No se encontraron resultados.';
                resultsContainer.appendChild(li);
            } else {
                for (let i = 0; i < matches.length; i++) {
                    const match = matches[i];
                    const li = document.createElement('li');
                    const link = document.createElement('a');
                    link.href = match.url;
                    link.textContent = match.title;
                    
                    // Add labels as small text
                    const labelsSpan = document.createElement('span');
                    labelsSpan.style.color = '#666';
                    labelsSpan.style.fontSize = '12px';
                    labelsSpan.style.marginLeft = '8px';
                    labelsSpan.textContent = `[${match.labels}]`;
                    
                    li.appendChild(link);
                    li.appendChild(labelsSpan);
                    resultsContainer.appendChild(li);
                }
            }
        }
        
        // Function to parse an entry string
        function parseEntry(entry) {
            // Pattern: ▓title – labels▒url▓
            const regex = /▓(.*?)\s*–\s*(.*?)▒(.*?)▓/;
            const match = entry.match(regex);
            if (match) {
                return {
                    title: match[1].trim(),
                    labels: match[2].trim(),
                    url: match[3].trim()
                };
            }
            return null;
        }
        
        // Wait for DOM to load
        document.addEventListener('DOMContentLoaded', function() {
            // Load entradas
            loadEntradas();
            
            // Add event listener to search box
            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', performSearch);
            
            // Focus on search box
            searchBox.focus();
        });
    </script>
</body>
</html>
