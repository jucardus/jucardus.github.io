<body>
    <h1>Buscar</h1>
    <input type="text" id="searchBox" placeholder="Buscar..." autocomplete="off">
    <ul id="results"></ul>

    <script src="entradas.js"></script>
    <script>
        const searchBox = document.getElementById('searchBox');
        const results = document.getElementById('results');
        
        function search() {
            const term = searchBox.value.toLowerCase().trim();
            results.innerHTML = '';
            
            if (term === '') return;
            
            let found = false;
            
            for (let i = 0; i < entradas.length; i++) {
                const entry = entradas[i];
                // Extract the text between ▓ and ▒ (title + labels)
                const match = entry.match(/▓(.*)▒/);
                if (match) {
                    const text = match[1].toLowerCase();
                    if (text.includes(term)) {
                        // Convert the entry to a clean link
                        const urlMatch = entry.match(/▒(.*)▓/);
                        const url = urlMatch[1];
                        const displayText = match[1];
                        const li = document.createElement('li');
                        const link = document.createElement('a');
                        link.href = url;
                        link.textContent = displayText;
                        li.appendChild(link);
                        results.appendChild(li);
                        found = true;
                    }
                }
            }
            
            if (!found) {
                results.innerHTML = '<li class="no-results">No matches found.</li>';
            }
        }
        
        searchBox.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search();
            }
        });
    </script>
</body>
