<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="Buscar en todas las entradas de Jucardus.com">
    <meta name="author" content="Jucardus ©">
    <meta name="keywords" content="búsqueda, buscar, search, entradas, índice">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <title>Búsqueda | Jucardus.com</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            margin-bottom: 20px;
        }
        
        #searchBox {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        #searchBox:focus {
            outline: none;
            border-color: #666;
        }
        
        #results {
            list-style: none;
        }
        
        #results li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        #results li a {
            text-decoration: none;
            color: #0066cc;
            font-weight: 500;
        }
        
        #results li a:hover {
            text-decoration: underline;
        }
        
        .labels {
            color: #666;
            font-size: 12px;
            margin-left: 8px;
        }
        
        .no-results {
            color: #666;
            font-style: italic;
            padding: 20px 0;
            text-align: center;
        }
        
        .count {
            margin-bottom: 15px;
            font-size: 14px;
            color: #666;
            padding: 5px 0;
        }
        
        .loading {
            color: #666;
            font-style: italic;
            padding: 20px 0;
            text-align: center;
        }
        
        .error {
            color: #cc0000;
            padding: 20px 0;
            text-align: center;
            background: #ffeeee;
            border-radius: 4px;
        }
        
        .debug {
            font-size: 11px;
            color: #999;
            margin-top: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Buscar en las entradas</h1>
    
    <input type="text" id="searchBox" placeholder="Escribe para buscar (título o etiquetas)..." autocomplete="off">
    
    <div class="count" id="count"></div>
    
    <ul id="results">
        <li class="loading">Cargando entradas...</li>
    </ul>
    
    <div class="debug" id="debug"></div>

    <script>
        let entradasArray = [];
        
        // Function to parse a single entry
        function parseEntry(entryString) {
            try {
                // Remove quotes if present
                let clean = entryString.trim();
                if ((clean.startsWith('"') && clean.endsWith('"')) || 
                    (clean.startsWith("'") && clean.endsWith("'"))) {
                    clean = clean.slice(1, -1);
                }
                
                // Find the special characters
                const startF = clean.indexOf('▓');
                const dash = clean.indexOf('–');
                const endLabel = clean.indexOf('▒');
                const endF = clean.lastIndexOf('▓');
                
                if (startF === -1 || dash === -1 || endLabel === -1 || endF === -1) {
                    console.warn('Could not parse entry:', clean);
                    return null;
                }
                
                const title = clean.substring(startF + 1, dash).trim();
                const labels = clean.substring(dash + 1, endLabel).trim();
                const url = clean.substring(endLabel + 1, endF).trim();
                
                return { title, labels, url };
            } catch(e) {
                console.error('Parse error:', e);
                return null;
            }
        }
        
        // Load and parse entradas.js
        function loadEntradas() {
            const debugDiv = document.getElementById('debug');
            
            fetch('/entradas.js?' + Date.now())
                .then(response => {
                    debugDiv.innerHTML += `Response status: ${response.status}<br>`;
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response.text();
                })
                .then(data => {
                    debugDiv.innerHTML += `File loaded, length: ${data.length} characters<br>`;
                    debugDiv.innerHTML += `First 200 chars: ${data.substring(0, 200)}<br>`;
                    
                    // Try to find the entradas array
                    let arrayContent = null;
                    
                    // Method 1: Look for const entradas = [
                    const match1 = data.match(/const\s+entradas\s*=\s*\[([\s\S]*?)\];/);
                    if (match1) {
                        debugDiv.innerHTML += `Found using method 1 (const entradas = [...])<br>`;
                        arrayContent = match1[1];
                    }
                    
                    // Method 2: Look for let entradas = [
                    if (!arrayContent) {
                        const match2 = data.match(/let\s+entradas\s*=\s*\[([\s\S]*?)\];/);
                        if (match2) {
                            debugDiv.innerHTML += `Found using method 2 (let entradas = [...])<br>`;
                            arrayContent = match2[1];
                        }
                    }
                    
                    // Method 3: Look for var entradas = [
                    if (!arrayContent) {
                        const match3 = data.match(/var\s+entradas\s*=\s*\[([\s\S]*?)\];/);
                        if (match3) {
                            debugDiv.innerHTML += `Found using method 3 (var entradas = [...])<br>`;
                            arrayContent = match3[1];
                        }
                    }
                    
                    // Method 4: Just look for any array assignment
                    if (!arrayContent) {
                        const match4 = data.match(/entradas\s*=\s*\[([\s\S]*?)\];/);
                        if (match4) {
                            debugDiv.innerHTML += `Found using method 4 (entradas = [...])<br>`;
                            arrayContent = match4[1];
                        }
                    }
                    
                    if (!arrayContent) {
                        debugDiv.innerHTML += `<span style="color: red;">ERROR: Could not find entradas array in file</span><br>`;
                        throw new Error('Could not find entradas array');
                    }
                    
                    debugDiv.innerHTML += `Array content length: ${arrayContent.length}<br>`;
                    
                    // Parse the array - find all quoted strings
                    const quoteMatches = [];
                    let inQuote = false;
                    let quoteStart = -1;
                    let i = 0;
                    
                    while (i < arrayContent.length) {
                        if (arrayContent[i] === '"' && (i === 0 || arrayContent[i-1] !== '\\')) {
                            if (!inQuote) {
                                inQuote = true;
                                quoteStart = i;
                            } else {
                                inQuote = false;
                                const quoteContent = arrayContent.substring(quoteStart, i + 1);
                                quoteMatches.push(quoteContent);
                            }
                        }
                        i++;
                    }
                    
                    debugDiv.innerHTML += `Found ${quoteMatches.length} quoted strings<br>`;
                    
                    if (quoteMatches.length === 0) {
                        throw new Error('No entries found in entradas array');
                    }
                    
                    entradasArray = [];
                    for (let j = 0; j < quoteMatches.length; j++) {
                        const parsed = parseEntry(quoteMatches[j]);
                        if (parsed) {
                            entradasArray.push(parsed);
                            debugDiv.innerHTML += `Parsed entry ${j+1}: "${parsed.title}"<br>`;
                        } else {
                            debugDiv.innerHTML += `Failed to parse entry ${j+1}: ${quoteMatches[j].substring(0, 100)}<br>`;
                        }
                    }
                    
                    debugDiv.innerHTML += `<span style="color: green;">✅ Successfully loaded ${entradasArray.length} entries</span><br>`;
                    
                    // Update UI
                    const resultsContainer = document.getElementById('results');
                    resultsContainer.innerHTML = '';
                    
                    const countDiv = document.getElementById('count');
                    if (entradasArray.length > 0) {
                        countDiv.textContent = `${entradasArray.length} entradas disponibles`;
                        // Enable search
                        performSearch();
                    } else {
                        throw new Error('No valid entries found');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    const resultsContainer = document.getElementById('results');
                    resultsContainer.innerHTML = `<li class="error">❌ Error: ${error.message}<br><br>Verifica la consola para más detalles.</li>`;
                    document.getElementById('count').textContent = 'Error de carga';
                    debugDiv.style.display = 'block';
                });
        }
        
        // Perform search
        function performSearch() {
            const searchBox = document.getElementById('searchBox');
            const resultsContainer = document.getElementById('results');
            const countDiv = document.getElementById('count');
            
            const searchTerm = searchBox.value.toLowerCase().trim();
            
            // Clear results
            resultsContainer.innerHTML = '';
            
            if (entradasArray.length === 0) {
                resultsContainer.innerHTML = '<li class="loading">Cargando entradas...</li>';
                return;
            }
            
            // If search is empty, show nothing
            if (searchTerm === '') {
                countDiv.innerHTML = `${entradasArray.length} entradas disponibles`;
                return;
            }
            
            // Search in titles and labels
            const matches = [];
            for (let i = 0; i < entradasArray.length; i++) {
                const entry = entradasArray[i];
                const titleLower = entry.title.toLowerCase();
                const labelsLower = entry.labels.toLowerCase();
                
                if (titleLower.includes(searchTerm) || labelsLower.includes(searchTerm)) {
                    matches.push(entry);
                }
            }
            
            // Update count
            countDiv.innerHTML = matches.length === 1 
                ? `✨ 1 resultado encontrado (de ${entradasArray.length} entradas)`
                : `✨ ${matches.length} resultados encontrados (de ${entradasArray.length} entradas)`;
            
            // Display results
            if (matches.length === 0) {
                resultsContainer.innerHTML = '<li class="no-results">🔍 No se encontraron resultados para "' + searchBox.value + '"</li>';
            } else {
                for (let i = 0; i < matches.length; i++) {
                    const match = matches[i];
                    const li = document.createElement('li');
                    
                    const link = document.createElement('a');
                    link.href = match.url;
                    link.textContent = match.title;
                    link.target = '_self';
                    
                    const labelsSpan = document.createElement('span');
                    labelsSpan.className = 'labels';
                    labelsSpan.textContent = `🏷️ ${match.labels}`;
                    
                    li.appendChild(link);
                    li.appendChild(labelsSpan);
                    resultsContainer.appendChild(li);
                }
            }
        }
        
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadEntradas();
            
            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', performSearch);
            searchBox.focus();
        });
    </script>
</body>
</html>
