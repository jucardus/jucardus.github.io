<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="Buscar en todas las entradas de Jucardus.com">
    <meta name="author" content="Jucardus ©">
    <meta name="keywords" content="búsqueda, buscar, search, entradas, índice">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <title>Búsqueda | Jucardus.com</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            margin-bottom: 20px;
        }
        
        #searchBox {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        #searchBox:focus {
            outline: none;
            border-color: #666;
        }
        
        #results {
            list-style: none;
        }
        
        #results li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        #results li a {
            text-decoration: none;
            color: #0066cc;
            font-weight: 500;
        }
        
        #results li a:hover {
            text-decoration: underline;
        }
        
        .labels {
            color: #666;
            font-size: 12px;
            margin-left: 8px;
        }
        
        .no-results {
            color: #666;
            font-style: italic;
            padding: 20px 0;
            text-align: center;
        }
        
        .count {
            margin-bottom: 15px;
            font-size: 14px;
            color: #666;
            padding: 5px 0;
        }
        
        .loading {
            color: #666;
            font-style: italic;
            padding: 20px 0;
            text-align: center;
        }
        
        .url {
            font-size: 11px;
            color: #999;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <h1>Buscar en las entradas</h1>
    
    <input type="text" id="searchBox" placeholder="Escribe para buscar (título o etiquetas)..." autocomplete="off">
    
    <div class="count" id="count"></div>
    
    <ul id="results">
        <li class="loading">Cargando entradas...</li>
    </ul>

    <script>
        let entradasArray = [];
        
        // Function to parse a single entry
        // Format: "▓title – labels▒url▓"
        function parseEntry(entryString) {
            // Remove the outer quotes if present
            let cleanString = entryString.trim();
            if (cleanString.startsWith('"') && cleanString.endsWith('"')) {
                cleanString = cleanString.slice(1, -1);
            }
            
            // Pattern: ▓...–...▒...▓
            const startIndex = cleanString.indexOf('▓');
            const dashIndex = cleanString.indexOf('–');
            const endLabelIndex = cleanString.indexOf('▒');
            const endUrlIndex = cleanString.lastIndexOf('▓');
            
            if (startIndex === -1 || dashIndex === -1 || endLabelIndex === -1 || endUrlIndex === -1) {
                return null;
            }
            
            // Extract parts
            const title = cleanString.substring(startIndex + 1, dashIndex).trim();
            const labels = cleanString.substring(dashIndex + 1, endLabelIndex).trim();
            const url = cleanString.substring(endLabelIndex + 1, endUrlIndex).trim();
            
            return { title, labels, url };
        }
        
        // Load and parse entradas.js
        function loadEntradas() {
            fetch('/entradas.js?' + Date.now()) // Add timestamp to avoid cache
                .then(response => {
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                    return response.text();
                })
                .then(data => {
                    // Extract the array using regex
                    const arrayMatch = data.match(/const\s+entradas\s*=\s*\[([\s\S]*?)\];/);
                    
                    if (!arrayMatch) {
                        throw new Error('Could not find entradas array');
                    }
                    
                    const arrayContent = arrayMatch[1];
                    
                    // Parse the array - match each quoted string
                    const stringMatches = arrayContent.match(/"[^"]*"/g);
                    
                    if (!stringMatches) {
                        throw new Error('No entries found in entradas array');
                    }
                    
                    entradasArray = [];
                    for (let i = 0; i < stringMatches.length; i++) {
                        const entryString = stringMatches[i];
                        const parsed = parseEntry(entryString);
                        if (parsed) {
                            entradasArray.push(parsed);
                        }
                    }
                    
                    // Update UI
                    const resultsContainer = document.getElementById('results');
                    resultsContainer.innerHTML = '';
                    
                    const countDiv = document.getElementById('count');
                    countDiv.textContent = `${entradasArray.length} entradas disponibles`;
                    
                    // Enable search
                    performSearch();
                })
                .catch(error => {
                    console.error('Error:', error);
                    const resultsContainer = document.getElementById('results');
                    resultsContainer.innerHTML = '<li class="no-results">❌ Error al cargar las entradas. Asegúrate de que el archivo entradas.js existe.</li>';
                    document.getElementById('count').textContent = 'Error de carga';
                });
        }
        
        // Perform search
        function performSearch() {
            const searchBox = document.getElementById('searchBox');
            const resultsContainer = document.getElementById('results');
            const countDiv = document.getElementById('count');
            
            const searchTerm = searchBox.value.toLowerCase().trim();
            
            // Clear results
            resultsContainer.innerHTML = '';
            
            if (entradasArray.length === 0) {
                resultsContainer.innerHTML = '<li class="loading">Cargando entradas...</li>';
                return;
            }
            
            // If search is empty, show nothing
            if (searchTerm === '') {
                countDiv.innerHTML = `${entradasArray.length} entradas disponibles`;
                return;
            }
            
            // Search in titles and labels
            const matches = [];
            for (let i = 0; i < entradasArray.length; i++) {
                const entry = entradasArray[i];
                const titleLower = entry.title.toLowerCase();
                const labelsLower = entry.labels.toLowerCase();
                
                if (titleLower.includes(searchTerm) || labelsLower.includes(searchTerm)) {
                    matches.push(entry);
                }
            }
            
            // Update count
            countDiv.innerHTML = matches.length === 1 
                ? `✨ 1 resultado encontrado (de ${entradasArray.length} entradas)`
                : `✨ ${matches.length} resultados encontrados (de ${entradasArray.length} entradas)`;
            
            // Display results
            if (matches.length === 0) {
                resultsContainer.innerHTML = '<li class="no-results">🔍 No se encontraron resultados para "' + searchBox.value + '"</li>';
            } else {
                for (let i = 0; i < matches.length; i++) {
                    const match = matches[i];
                    const li = document.createElement('li');
                    
                    const link = document.createElement('a');
                    link.href = match.url;
                    link.textContent = match.title;
                    link.target = '_self';
                    
                    const labelsSpan = document.createElement('span');
                    labelsSpan.className = 'labels';
                    labelsSpan.textContent = `🏷️ ${match.labels}`;
                    
                    li.appendChild(link);
                    li.appendChild(labelsSpan);
                    resultsContainer.appendChild(li);
                }
            }
        }
        
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadEntradas();
            
            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', performSearch);
            searchBox.focus();
        });
    </script>
</body>
</html>
