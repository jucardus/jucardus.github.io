<!DOCTYPE html>
<html lang="es">
<head>
</head>

  <body onload='inicio()'>
  
  <div id='mostrar'></div>
  
    <script>
    
    var resultado = [];
    var lema = 'ccc';
  
    var array = [
      'aaa.md',
      'bbb.md',
      'ccc.md',
      'ddd.md'
      ];
      
    function inicio() {
      for (let i = 0; i < array.length; i++) {
        recorrer(array[i]);
      }
    }
    
    function recorrer (documento) {
      fetch(documento)
        .then(response => response.text())
        .then(contenidoDoc => {
          if(buscar(contenidoDoc, lema)) {
            modificar(documento, contenidoDoc);
          }    
        });
    }
    
    function buscar(contenidoDoc,lema) {
      if (contenidoDoc.indexOf(lema) >= 0) return true;
      return false;
    }
    
    function modificar (documento, contenidoDoc) {
      var titulo = contenidoDoc.replace(/## /g,'').replace(/\n.*/g,'');
      let enlaces = '<h2>' + titulo + '</h2><a href="' + documento + '">' + documento + "</a><br>";
      resultado = enlaces.sort((a, b) => a.localeCompare(b)); // ordenamiento alfabewtico
      resultado = [...new Set(resultado)]; // eliminar elementos repetidos
      resultado = resultado.filter(Boolean); // eliminar elementos vaciwos
      document.getElementById('mostrar').innerHTML +=  resultado;
    }
    
    </script>
  </body>
</html>
