<!DOCTYPE html>
<html lang="es">
<head>
</head>

  <body onload='inicio()'>
  
  <div id='mostrar'></div>
  
    <script>
    
    var resultado = [];
    var lema = 'ccc';
  
    var array = [
      'aaa.md',
      'bbb.md',
      'ccc.md',
      'ddd.md'
      ];
      
    function inicio() {
      for (let i = 0; i < array.length; i++) {
        recorrer(array[i]);
      }
    }
    
    function recorrer (recibido, ultimo) {
      fetch(recibido)
        .then(response => response.text())
        .then(textString => {
          if(buscar(textString, lema)) {
            modificar(recibido);
          }    
        });
    }
    
    function buscar(texto,palabra) {
      if(texto.indexOf(palabra)>=0) return true;
      return false;
    }
    
    function modificar(recibido) {
      let txt = '<a href="' + recibido + '">' + recibido + "</a><br>";
      document.getElementById('mostrar').innerHTML +=  txt;
    }
    
    </script>
  </body>
</html>
