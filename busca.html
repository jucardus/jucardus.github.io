<!DOCTYPE html>
<html lang="es">
<head>
</head>

  <body onload='inicio()'>
  
  <div id='mostrar'></div>
  
    <script>
    
    var resultado = [];
    var lema = 'ccc';
  
    var array = [
      'aaa.md',
      'bbb.md',
      'ccc.md',
      'ddd.md'
      ];
      
    function inicio() {
      for (let i = 0; i < array.length; i++) {
        recorrer(array[i]);
      }
    }
    
    function recorrer (documento) {
      fetch(documento)
        .then(response => response.text())
        .then(contenidoDoc => {
          if(buscar(contenidoDoc, lema)) {
            modificar(documento);
          }    
        });
    }
    
    function buscar(contenidoDoc,lema) {
      if(contenidoDoc.indexOf(lema) >= 0) return true;
      return false;
    }
    
    function modificar(recibido) {
      let enlace = '<a href="' + recibido + '">' + recibido + "</a><br>";
      document.getElementById('mostrar').innerHTML +=  enlace;
    }
    
    </script>
  </body>
</html>
