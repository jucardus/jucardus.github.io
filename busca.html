<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="Buscar en todas las entradas de Jucardus.com">
    <meta name="author" content="Jucardus ©">
    <meta name="keywords" content="búsqueda, buscar, search, entradas, índice">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <title>Búsqueda | Jucardus.com</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            margin-bottom: 20px;
        }
        
        #searchBox {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        #searchBox:focus {
            outline: none;
            border-color: #666;
        }
        
        #results {
            list-style: none;
        }
        
        #results li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        #results li a {
            text-decoration: none;
            color: #0066cc;
            font-weight: 500;
        }
        
        #results li a:hover {
            text-decoration: underline;
        }
        
        .labels {
            color: #666;
            font-size: 12px;
            margin-left: 8px;
        }
        
        .no-results {
            color: #666;
            font-style: italic;
            padding: 20px 0;
            text-align: center;
        }
        
        .count {
            margin-bottom: 15px;
            font-size: 14px;
            color: #666;
            padding: 5px 0;
        }
        
        .loading {
            color: #666;
            font-style: italic;
            padding: 20px 0;
            text-align: center;
        }
        
        .error {
            color: #cc0000;
            padding: 20px 0;
            text-align: center;
            background: #ffeeee;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Buscar en las entradas</h1>
    
    <input type="text" id="searchBox" placeholder="Escribe para buscar (título o etiquetas)..." autocomplete="off">
    
    <div class="count" id="count"></div>
    
    <ul id="results">
        <li class="loading">Cargando entradas...</li>
    </ul>

    <script>
        let entradasArray = [];
        
        // Function to parse a single entry (without quotes)
        function parseEntry(entryString) {
            try {
                // Trim whitespace
                let clean = entryString.trim();
                
                // Remove trailing comma if present
                if (clean.endsWith(',')) {
                    clean = clean.slice(0, -1);
                }
                
                // Find the special characters
                const startF = clean.indexOf('▓');
                const dash = clean.indexOf('–');
                const endLabel = clean.indexOf('▒');
                const endF = clean.lastIndexOf('▓');
                
                if (startF === -1 || dash === -1 || endLabel === -1 || endF === -1) {
                    return null;
                }
                
                const title = clean.substring(startF + 1, dash).trim();
                const labels = clean.substring(dash + 1, endLabel).trim();
                const url = clean.substring(endLabel + 1, endF).trim();
                
                return { title, labels, url };
            } catch(e) {
                console.error('Parse error:', e);
                return null;
            }
        }
        
        // Load and parse entradas.js
        function loadEntradas() {
            fetch('/entradas.js?' + Date.now())
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response.text();
                })
                .then(data => {
                    // Find the array content between [ and ]
                    const arrayStart = data.indexOf('[');
                    const arrayEnd = data.lastIndexOf(']');
                    
                    if (arrayStart === -1 || arrayEnd === -1) {
                        throw new Error('Could not find array brackets in entradas.js');
                    }
                    
                    let arrayContent = data.substring(arrayStart + 1, arrayEnd);
                    
                    // Split by ▓ to get individual entries
                    // Each entry starts with ▓ and ends with ▓
                    const entries = [];
                    let currentEntry = '';
                    let inEntry = false;
                    
                    for (let i = 0; i < arrayContent.length; i++) {
                        const char = arrayContent[i];
                        
                        if (char === '▓') {
                            if (!inEntry) {
                                // Start of a new entry
                                inEntry = true;
                                currentEntry = '▓';
                            } else {
                                // End of current entry
                                currentEntry += '▓';
                                entries.push(currentEntry);
                                currentEntry = '';
                                inEntry = false;
                            }
                        } else if (inEntry) {
                            currentEntry += char;
                        }
                    }
                    
                    // Parse each entry
                    entradasArray = [];
                    for (let i = 0; i < entries.length; i++) {
                        const parsed = parseEntry(entries[i]);
                        if (parsed) {
                            entradasArray.push(parsed);
                        }
                    }
                    
                    if (entradasArray.length === 0) {
                        throw new Error('No valid entries found');
                    }
                    
                    // Update UI
                    const resultsContainer = document.getElementById('results');
                    resultsContainer.innerHTML = '';
                    
                    const countDiv = document.getElementById('count');
                    countDiv.textContent = `${entradasArray.length} entradas disponibles`;
                    
                    // Enable search
                    performSearch();
                })
                .catch(error => {
                    console.error('Error:', error);
                    const resultsContainer = document.getElementById('results');
                    resultsContainer.innerHTML = `<li class="error">❌ Error: ${error.message}</li>`;
                    document.getElementById('count').textContent = 'Error de carga';
                });
        }
        
        // Perform search
        function performSearch() {
            const searchBox = document.getElementById('searchBox');
            const resultsContainer = document.getElementById('results');
            const countDiv = document.getElementById('count');
            
            const searchTerm = searchBox.value.toLowerCase().trim();
            
            // Clear results
            resultsContainer.innerHTML = '';
            
            if (entradasArray.length === 0) {
                resultsContainer.innerHTML = '<li class="loading">Cargando entradas...</li>';
                return;
            }
            
            // If search is empty, show nothing
            if (searchTerm === '') {
                countDiv.innerHTML = `${entradasArray.length} entradas disponibles`;
                return;
            }
            
            // Search in titles and labels
            const matches = [];
            for (let i = 0; i < entradasArray.length; i++) {
                const entry = entradasArray[i];
                const titleLower = entry.title.toLowerCase();
                const labelsLower = entry.labels.toLowerCase();
                
                if (titleLower.includes(searchTerm) || labelsLower.includes(searchTerm)) {
                    matches.push(entry);
                }
            }
            
            // Update count
            countDiv.innerHTML = matches.length === 1 
                ? `✨ 1 resultado encontrado (de ${entradasArray.length} entradas)`
                : `✨ ${matches.length} resultados encontrados (de ${entradasArray.length} entradas)`;
            
            // Display results
            if (matches.length === 0) {
                resultsContainer.innerHTML = '<li class="no-results">🔍 No se encontraron resultados para "' + searchBox.value + '"</li>';
            } else {
                for (let i = 0; i < matches.length; i++) {
                    const match = matches[i];
                    const li = document.createElement('li');
                    
                    const link = document.createElement('a');
                    link.href = match.url;
                    link.textContent = match.title;
                    link.target = '_self';
                    
                    const labelsSpan = document.createElement('span');
                    labelsSpan.className = 'labels';
                    labelsSpan.textContent = `🏷️ ${match.labels}`;
                    
                    li.appendChild(link);
                    li.appendChild(labelsSpan);
                    resultsContainer.appendChild(li);
                }
            }
        }
        
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadEntradas();
            
            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', performSearch);
            searchBox.focus();
        });
    </script>
</body>
</html>
