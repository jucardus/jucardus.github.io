<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="Buscar en todas las entradas de Jucardus.com">
    <meta name="author" content="Jucardus ©">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <title>Búsqueda | Jucardus.com</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            margin-bottom: 20px;
        }
        
        #searchBox {
            width: 300px;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        #searchBox:focus {
            outline: none;
            border-color: #666;
        }
        
        #results {
            list-style: disc;
            margin-left: 20px;
        }
        
        #results li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        #results li a {
            text-decoration: none;
            color: #0066cc;
        }
        
        #results li a:hover {
            text-decoration: underline;
        }
        
        .no-results {
            color: #666;
            font-style: italic;
            padding: 20px 0;
            list-style: none;
            margin-left: 0;
        }
    </style>
</head>
<body>
    <h1>Buscar</h1>
    
    <input type="text" id="searchBox" placeholder="Buscar..." autocomplete="off">
    
    <ul id="results"></ul>

    <script>
        const searchBox = document.getElementById('searchBox');
        const results = document.getElementById('results');
        let allEntries = [];
        
        // Fetch and parse entradas.js
        fetch('/entradas.js?' + Date.now())
            .then(response => response.text())
            .then(data => {
                // Find all entries between ▓ and ▓
                const matches = data.match(/▓[^▓]+▓/g);
                
                if (matches) {
                    for (let i = 0; i < matches.length; i++) {
                        let entry = matches[i];
                        entry = entry.substring(1, entry.length - 1);
                        const parts = entry.split('▒');
                        if (parts.length === 2) {
                            const titleAndLabels = parts[0];
                            const url = parts[1];
                            const titleParts = titleAndLabels.split(' – ');
                            const title = titleParts[0];
                            const labels = titleParts[1];
                            
                            allEntries.push({
                                title: title,
                                labels: labels,
                                url: url,
                                searchText: (title + ' ' + labels).toLowerCase()
                            });
                        }
                    }
                }
            })
            .catch(error => {
                console.error('Error:', error);
            });
        
        function search() {
            const term = searchBox.value.toLowerCase().trim();
            results.innerHTML = '';
            
            if (term === '' || allEntries.length === 0) return;
            
            let found = false;
            
            for (let i = 0; i < allEntries.length; i++) {
                const entry = allEntries[i];
                
                if (entry.searchText.includes(term)) {
                    const li = document.createElement('li');
                    const link = document.createElement('a');
                    link.href = entry.url;
                    link.textContent = `${entry.title} – ${entry.labels}`;
                    li.appendChild(link);
                    results.appendChild(li);
                    found = true;
                }
            }
            
            if (!found) {
                const li = document.createElement('li');
                li.className = 'no-results';
                li.textContent = 'No matches found.';
                results.appendChild(li);
            }
        }
        
        searchBox.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search();
            }
        });
    </script>
</body>
</html>
