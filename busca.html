<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="Buscar en todas las entradas de Jucardus.com">
    <meta name="author" content="Jucardus ©">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <title>Búsqueda | Jucardus.com</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            margin-bottom: 20px;
        }
        
        #searchBox {
            width: 300px;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        #searchBox:focus {
            outline: none;
            border-color: #666;
        }
        
        #results {
            list-style: none;
        }
        
        #results li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        #results li a {
            text-decoration: none;
            color: #0066cc;
        }
        
        #results li a:hover {
            text-decoration: underline;
        }
        
        .no-results {
            color: #666;
            font-style: italic;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Buscar</h1>
    
    <input type="text" id="searchBox" placeholder="Buscar..." autocomplete="off">
    
    <ul id="results"></ul>

    <script src="entradas.js"></script>
    <script>
        const searchBox = document.getElementById('searchBox');
        const results = document.getElementById('results');
        
        function search() {
            const term = searchBox.value.toLowerCase().trim();
            results.innerHTML = '';
            
            if (term === '') return;
            
            let found = false;
            
            for (let i = 0; i < entradas.length; i++) {
                const entry = entradas[i];
                
                if (entry.toLowerCase().includes(term)) {
                    const li = document.createElement('li');
                    li.innerHTML = entry;
                    results.appendChild(li);
                    found = true;
                }
            }
            
            if (!found) {
                results.innerHTML = '<li class="no-results">No matches found.</li>';
            }
        }
        
        searchBox.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search();
            }
        });
    </script>
</body>
</html>
