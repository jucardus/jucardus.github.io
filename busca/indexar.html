<!DOCTYPE html>
<html lang="es">

  <head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico">
  </head>

  <body onload='indexar ()'>
    <div id="mostrar"></div>
  </body>

  <script src="busca-base.js"></script>

  <script>

    let lema = '/';
    let todos = [];

    function indexar () {
      todos = [];
      var array = base;
        array = array.sort((a, b) => a.localeCompare(b));
      for (let i = 0; i < array.length; i++) {
        var documento = array[i].replace('https://github.com/jucardus/jucardus.github.io/blob/main','..');
        recorrer (documento,lema);
      }
    }
    
    function recorrer (documento,lema) {
      fetch(documento)
        .then(response => response.text())
        .then(contenidoDoc => {
          if(buscar2 (contenidoDoc, lema)) {
            modificar(documento, contenidoDoc);
          }    
        });
    }
    
    function buscar2 (contenidoDoc,lema) {
      if (contenidoDoc.toUpperCase().indexOf(lema.toUpperCase()) >= 0) return true;
      return false;
    }

    function modificar (documento, contenidoDoc) {
      var titulo = contenidoDoc.replace(/## /g,'').replace(/\n.*/g,'');
      var orden = titulo.toUpperCase()
        .replace(/ /g,'')
        .replace(/-/g,'')
        .replace(/\//g,'')
        .replace(/\¿/g,'')
        .replace(/\?/g,'')
        .replace(/\!/g,'')
        .replace(/\¡/g,'')
        .replace(/«/g,'')
        .replace(/»/g,'')
        .replace(/Á/g,'A')
        .replace(/É/g,'E')
        .replace(/Í/g,'I')
        .replace(/Ó/g,'O')
        .replace(/Ú/g,'U')
        .replace(/Ü/g,'U')
        .replace(/Ñ/g,'N');
      let enlace = '<!--' + orden + '-->* [' + titulo + '](' + documento.replace('.md','.html') + ')<br/>';
      todos.push(enlace);
        todos = todos.sort((a, b) => a.localeCompare(b));
      document.getElementById('mostrar').innerHTML = todos;
      window.scrollTo(0, 0);
    }
        
  </script>
</html>
