<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
      // Get the current path (e.g., /goqnyaqf)
      var path = window.location.pathname;
      
      // Remove the leading slash and use it as the query parameter
      var query = path.substring(1);
      
      // Redirect immediately to the homepage with the q parameter
      if (query) {
        window.location.replace("https://jucardus.github.io/?q=" + encodeURIComponent(query));
      } else {
        // If no path, just go to homepage
        window.location.replace("https://jucardus.github.io");
      }
    </script>
    <style>
      a {
        color: Lime;
      }
      body {
        background-color: #3a3a3a;
        color: WhiteSmoke;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h3>[ REDIRIGIENDO... ]</h3>
      <h3>[ <a href="https://jucardus.github.io">VOLVER AL INICIO</a> ]</h3>
      <p>Si no eres redirigido automáticamente, haz clic en el enlace de arriba.</p>
    </div>
  </body>
</html>
