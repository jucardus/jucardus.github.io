    <style>
        .sites-embed iframe, iframe {
            margin-top: -70px !important;
            border: none !important;
            height: 110vh !important;
            overflow: hidden !important;
        }
       
        /* Escritorio */
        @media screen and (min-width: 1024px) {
            .sites-embed iframe, iframe {
                width: 80% !important;
            }
        }
       
        /* Móviles - Enhanced to hide Box header */
        @media screen and (max-width: 1023px) {
            .sites-embed iframe, iframe {
                width: 100% !important;
                margin-top: -85px !important;   /* Increased negative margin to push header up and out of view */
                height: 110vh !important;       /* Extra height to compensate */
                overflow: hidden !important;
                position: relative !important;
            }
           
            /* Additional cropping attempt for the top bar */
            .sites-embed iframe, iframe {
                clip: rect(70px, 100%, 100%, 0) !important;   /* Crops the top ~70px where the header usually sits */
            }
        }
    </style>
</head>
