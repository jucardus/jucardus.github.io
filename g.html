<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirigiendo a Grok...</title>
</head>
<body>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    let prompt = urlParams.get('q') || urlParams.get('text') || urlParams.get('prompt') || '';

    if (prompt) {
      const encoded = encodeURIComponent(prompt);
      window.location.href = `https://x.com/i/grok?text=${encoded}`;
    } else {
      window.location.href = 'https://x.com/i/grok';
    }
  </script>
</body>
</html>
