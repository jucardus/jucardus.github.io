<html>
  <body onload='inicio ()'>
    <div id='mostrar'></div>
    <script>
      function inicio () {
        fetch('= JUCARDUS =_= base =.csv')
          .then(response => response.text())
          .then(textString => {
            formateo(textString);
          });
      }
      var incremento = '';
      function formateo (recibido) {
        for (let i = 1; i < 1000; i++) {
          //var regex = new RegExp(i, 'g');
          //recibido.replaceAll(regex,"łłłłłłłłłłłłł","g");
          recibido.replace(new RegExp(i, "g"), "łłłłłłłłł");
        }
        var mostrar = recibido
          .replace(/\m/g,'')
          .replace(/łłł/g,'<p>');
        document.getElementById('mostrar').innerHTML = mostrar;
      }
    </script>
  </body>
</html>
