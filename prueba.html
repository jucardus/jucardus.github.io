<html>
  <body onload='inicio ()'>
    <div id='mostrar'></div>
    <script>
      function inicio () {
        fetch('= JUCARDUS =_= base =.csv')
          .then(response => response.text())
          .then(textString => {
            formateo(textString);
          });
      }
      function formateo (recibido) {
        for (let i = 1; i < 1000; i++) {
          recibido.replace(new RegExp(i, "g"), "łłł" + i + "¶¶¶");
        }
        var mostrar = recibido
          .replace(/\m/g,'')
          .replace(/łłł/g,'\n');
        document.getElementById('mostrar').innerHTML = mostrar;
      }
    </script>
  </body>
</html>
