<html>
  <body onload='inicio ()'>
    <div id='mostrar'></div>
    <script>
      function inicio () {
        fetch('= JUCARDUS =_= base =.csv')
          .then(response => response.text())
          .then(textString => {
            formateo(textString);
          });
      }
      function formateo (recibido) {
        for (let i = 1; i < 1000; i++) {
          var reg = new RegEx(i, 'g');
          recibido.replace(reg,'łłł' + i + '');
        }

        document.getElementById('mostrar').innerHTML = mostrar;
      }
    </script>
  </body>
</html>
