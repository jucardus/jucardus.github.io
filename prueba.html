<html>
  <body onload='inicio ()'>
    <div id='mostrar'></div>
    <script>
      function inicio () {
        fetch('= JUCARDUS =_= base =.csv')
          .then(response => response.text())
          .then(textString => {
            formateo(textString);
          });
      }
      var incremento = '';
      function formateo (recibido) {
        for (let i = 1; i < 1000; i++) {
          //var regex = new RegExp(i, 'g');
          //recibido.replace(/3/g,'łłłłłłłłłłłłł');
          incremento = incremento + '¶' + i;
        }
        var mostrar = recibido
          .replace(/\m/g,'')
          .replace(/łłł/g,'\n');
        document.getElementById('mostrar').innerHTML = incremento;
      }
    </script>
  </body>
</html>
