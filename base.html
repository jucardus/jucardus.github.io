<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Base de datos CSV de Jucardus</title>
    <meta name="description" content="Base de datos CSV del contenido de jucardus.github.io.">
</head>
<body>
    <h1>Base de datos de Jucardus</h1>
    <div id="csv-content"></div>
    <script>
        fetch('base.csv')
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').map(row => row.split(','));
                const table = document.createElement('table');
                rows.forEach(row => {
                    const tr = document.createElement('tr');
                    row.forEach(cell => {
                        const td = document.createElement('td');
                        td.textContent = cell;
                        tr.appendChild(td);
                    });
                    table.appendChild(tr);
                });
                document.getElementById('csv-content').appendChild(table);
            });
    </script>
</body>
</html>
