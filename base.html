    <meta charset="UTF-8">
    <title>Base de datos CSV de Jucardus</title>
    <meta name="description" content="Base de datos CSV del contenido de jucardus.github.io.">
    <meta name = "keywords" content = "apotegmas, citas, cuentos, diario, enlaces, vínculos, hipervínculos, reflexiones, sinónimos, vocabularios, apotegma, cita, cuento, diario, enlace, vínculo, hipervínculo, reflexión, sinónimo, vocabulario, vocabulario inglés-español, vocabulario inglés, sinónimos ingleses, sinónimos españoles" />

</head>
<body>
    <h1><a href='https://jucardus.github.io'>Base de datos de Jucardus</a></h1>
    <div id="csv-content"></div>
    <script>
        fetch('base.csv')
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').map(row => row.replace(/\"/g,'').replace(/\, /g,'ŧ ').split(','));
                const table = document.createElement('table');
                rows.forEach(row => {
                    const tr = document.createElement('tr');
                    row.forEach(cell => {
                        const td = document.createElement('td');
                        td.textContent = extractText(cell).replace(/ŧ /g,', ');
                        tr.appendChild(td);
                    });
                    table.appendChild(tr);
                });
                document.getElementById('csv-content').appendChild(table);
            });
      const extractText = (htmlString) => {
        const doc = new DOMParser().parseFromString(htmlString, 'text/html');
        return doc.body.textContent || "";
      };
    </script>
</body>
</html>
