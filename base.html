    <meta charset="UTF-8">
    <title>Base de datos CSV de Jucardus</title>
    <meta name="description" content="Base de datos CSV del contenido de jucardus.github.io.">

<style>
  /* Global styles (apply to all screen sizes) */
  table {
    width: 100%;
    max-width: 100%; /* Prevents table from overflowing */
    border-collapse: separate; /* Allows spacing between cells */
    border-spacing: 0 10px; /* Adds vertical spacing between rows */
  }

  td, th {
    padding: 8px; /* Padding inside cells */
    border-bottom: 1px solid #ddd; /* Visual separation */
  }

  td:nth-child(4), th:nth-child(4) {
    word-wrap: break-word; /* Breaks long words to fit */
    overflow-wrap: break-word; /* Modern equivalent */
    white-space: normal; /* Allows text to wrap */
    max-width: 100%; /* Limits cell width to container */
  }

  /* Hide columns 5 and beyond on desktop */
  td:nth-child(n+5), th:nth-child(n+5) {
    display: none; /* Hides all columns from 5 onward */
  }

  body {
    font-family: 'Inter', sans-serif;
  }

  /* Mobile-specific styles */
  @media only screen and (max-width: 480px) {
    th, td {
      display: none; /* Hide all columns */
    }
    th:nth-child(4), td:nth-child(4) {
      display: table-cell; /* Keep table layout */
      width: 100%; /* Full width of table */
      max-width: 100%; /* Prevent overflow */
      box-sizing: border-box;
    }
    table {
      width: 100%;
      max-width: 100%;
    }
  }
</style>

</head>
<body>
    <h1><a href='https://jucardus.github.io'>Base de datos de Jucardus</a></h1>
    <!--div id="csv-content" style="overflow-x: auto;"></div-->
    <div id="csv-content"></div>
    <script>
        fetch('base.csv')
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').map(row => row.replace(/\"/g,'').replace(/\, /g,'ŧ ').split(','));
                const table = document.createElement('table');
                rows.forEach(row => {
                    const tr = document.createElement('tr');
                    row.forEach(cell => {
                        const td = document.createElement('td');
                        td.textContent = cell.replace(/ŧ /g,', ');
                        tr.appendChild(td);
                    });
                    table.appendChild(tr);
                });
                document.getElementById('csv-content').appendChild(table);
            });
    </script>
</body>
</html>
